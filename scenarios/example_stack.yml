name: "example_stack"
description: "A complete stack example"
apps:
  - name: "foundation"
    
  - name: "postgresql"
    depends_on: ["foundation"]
    vars:
      container_app_ports:
        - "5432:5432"
      container_app_volumes:
        - "/data/pg:/var/lib/postgresql/data"

  - name: "nginx"
    depends_on: ["foundation"]
    vars:
      container_app_ports:
        - "80:80"
