---
# .pre-commit-config.yaml - Second Line of Defense
#
# -- Triple Guarantee ----------------------------------------------
# This configuration implements the "Incremental Shift-Left" philosophy.
# It ensures that all staged changes meet the project's quality standards BEFORE
# they are committed to the repository.
#
# Layers of Defense:
#   1. Agent/Dev Auto-fix: Immediate local correction (eslint --fix, etc.).
#   2. Git Commit Intercept (THIS FILE): Incremental scan of staged files.
#   3. CI/CD Strict Checks: Authoritative full-repository audit.
#
# Setup (Local Machine):
#   sh scripts/setup.sh hooks
#
# Manual Run:
#   pre-commit run --all-files
#
# ------------------------------------------------------------------------------

fail_fast: false
default_stages: [pre-commit, pre-merge-commit]
exclude: |
  (?x)^(
    \.git/|
    node_modules/|
    \.venv/|venv/|env/|
    vendor/|
    dist/|build/|out/|target/|
    \.next/|\.nuxt/|\.output/|
    __pycache__/|
    \.specify/|
    \.tmp/|tmp/|
    \.(venv|idx|continue|history|vscode-test)/.*|
    internal/addlicense/testdata/.*|
    \.aider\.conf\.yml
  )

repos:
  - repo: local
    hooks:
      # -- Git Hygiene (Incremental) ------------------------------------------
      - id: trailing-whitespace
        name: trim trailing whitespace
        entry: scripts/pre-commit/trailing-whitespace.py
        language: system
        types: [text]
        exclude: |
          (?x)^(
            \.md$|.*\.lock$|go\.sum$
          )
        stages: [pre-commit, pre-merge-commit]
        description: "Standardize text hygiene by removing trailing whitespace."

      - id: end-of-file-fixer
        name: fix end of files
        entry: scripts/pre-commit/end-of-file-fixer.py
        language: system
        types: [text]
        exclude: |
          (?x)^(
            .*\.lock$|go\.sum$
          )
        stages: [pre-commit, pre-merge-commit]
        description: "Ensure that files end with a single newline character."

      - id: check-added-large-files
        name: check for added large files
        entry: scripts/pre-commit/check-added-large-files.py
        language: system
        exclude: |
          (?x)^(
            examples/plugin-go/unirtm-plugin-example|
            docs/tapes/demo\.gif
          )
        stages: [pre-commit, pre-merge-commit]
        description: "Prevent large files (>1MB) from being committed."

      - id: check-merge-conflict
        name: check for merge conflicts
        entry: scripts/pre-commit/check-merge-conflict.py
        language: system
        types: [text]
        stages: [pre-commit, pre-merge-commit]
        description: "Intercept files containing git merge conflict markers."

      - id: check-case-conflict
        name: check for case conflicts
        entry: scripts/pre-commit/check-case-conflict.py
        language: system
        stages: [pre-commit, pre-merge-commit]
        description: "Verify that filenames are unique across case-insensitive filesystems."

      - id: check-symlinks
        name: check for broken symlinks
        entry: scripts/pre-commit/check-symlinks.py
        language: system
        stages: [pre-commit, pre-merge-commit]
        description: "Ensure symlinks point to existing locations."

      - id: check-utf8-bom
        name: check for utf8 bom
        entry: scripts/pre-commit/check-utf8-bom.py
        language: system
        types: [text]
        exclude: scripts/sync-labels\.ps1$
        description: "Prevent illegal Byte Order Mark (BOM) in UTF-8 files."

      # -- Data & Configuration Hygiene ---------------------------------------
      - id: check-json
        name: check json well-formedness
        entry: scripts/pre-commit/check-json.py
        language: system
        types: [json]
        exclude: '\.vscode/.*\.json$'
        description: "Verify that JSON files are well-formed."

      - id: check-toml
        name: check toml well-formedness
        entry: scripts/pre-commit/check-toml.py
        language: system
        types: [toml]
        description: "Verify that TOML files are well-formed (requires Python 3.11+ or tomllib)."

      - id: check-ini
        name: check ini well-formedness
        entry: scripts/pre-commit/check-ini.py
        language: system
        files: '\.(ini|editorconfig|properties)$'
        exclude: '\.(editorconfig|\.vscode/.*\.json)$'
        description: "Verify that INI and property files are well-formed."

      - id: check-jsonc
        name: check jsonc well-formedness
        entry: scripts/pre-commit/check-jsonc.py
        language: system
        files: '\.(jsonc|json5)$|tsconfig.*\.json$|devcontainer\.json$|\.vscode/.*\.json$'
        description: "Verify that JSON with Comments (JSONC/JSON5) files are well-formed."

      - id: check-env-safety
        name: check environment safety
        entry: scripts/pre-commit/check-env-safety.py
        language: system
        files: '\.env(\..+)?$'
        description: "Verify that .env files and templates do not contain real secrets or high-entropy values."

      # -- Formatting (Auto-fix) ----------------------------------------------
      - id: prettier
        name: prettier format
        language: system
        entry: unirtm hook-exec prettier --write
        types_or:
          - json
          - yaml
          - vue
          - javascript
          - jsx
          - ts
          - tsx
          - graphql
          - sql
          - html
          - css
          - markdown
          - astro
          - svelte
        description: "Format web-standard file types using Prettier (including Astro/Svelte)."

      - id: zizmor
        name: zizmor security audit
        language: system
        entry: unirtm hook-exec zizmor --config .zizmor.yml --no-online-audits
        files: ^\.github/workflows/.*\.yml$
        description: "Audit GitHub Actions workflows for security vulnerabilities (offline; full online audit runs in CI audit job)."

      - id: shfmt
        name: shfmt format
        language: system
        entry: unirtm hook-exec shfmt -w -s -i 2
        types: [shell]
        description: "Format shell scripts according to POSIX standards."

      - id: taplo
        name: taplo format
        language: system
        entry: unirtm hook-exec taplo format
        types: [toml]
        description: "Format TOML files using Taplo."

      - id: gofmt
        name: gofmt
        language: system
        entry: unirtm hook-exec gofmt -w
        types: [go]
        description: "Canonical Go code formatting."

      - id: goimports
        name: goimports
        language: system
        entry: unirtm hook-exec goimports -w
        types: [go]
        description: "Manage Go imports and formatting."

      # Temporarily disabled (consider using unirtm hook-exec if needed or removed if govulncheck replaces it)
      #      - id: golangci-lint
      #        name: golangci-lint
      #        language: system
      #        entry: unirtm hook-exec golangci-lint run --fix
      #        types: [go]
      #        pass_filenames: false
      #        exclude: |
      #          (?x)^(\.github/agents|agent|agents|roo|claude|qwen|amazonq|augment|bob|codebuddy|codex|kilocode|opencode|qoder|shai|cursor|windsurf|pearai|pi|pochi|supermaven|tabnine|trae|vibe|void|zed|zencoder|openhands|cody|coderabbit|aide|cline|clinerules|cursorrules|pr_agent.toml)/.*
      #        description: "Comprehensive Go linter aggregator."

      # -- Secret Scanning ----------------------------------------------------
      - id: gitleaks
        name: gitleaks quality check
        language: system
        entry: unirtm hook-exec gitleaks protect --verbose --redact --staged --config .gitleaks.toml
        always_run: true
        pass_filenames: false
        description: "Prevent secret leaks using Gitleaks."

      - id: detect-private-key
        name: detect private keys
        entry: scripts/pre-commit/detect-private-key.py
        language: system
        types: [text]
        exclude: '\.pre-commit-config\.yaml$'
        description: "Prevent accidental staging of sensitive private keys."

      - id: hadolint
        name: hadolint quality check
        language: system
        entry: unirtm hook-exec hadolint
        files: "Dockerfile.*"
        description: "Audit Dockerfiles for best practices and security vulnerabilities."

      # -- Deep Security & Vulnerability Audits -------------------------------
      - id: osv-scanner
        name: osv-scanner vulnerability audit
        language: system
        entry: unirtm hook-exec osv_scanner --config .osv-scanner.toml --call-analysis=all --format table --lockfile
        files: '(pnpm-lock\.yaml|go\.mod|Cargo\.lock|package-lock\.json|yarn\.lock|bun\.lockb)$'
        description: "Audit project dependencies for known vulnerabilities using Google OSV-Scanner."
        stages: [manual, pre-push] # Skip in local pre-commit, run in CI or manually

      - id: trivy
        name: trivy security scan
        language: system
        entry: unirtm hook-exec trivy fs . --scanners vuln,misconfig,secret --skip-dirs internal/addlicense/testdata --db-repository public.ecr.aws/aquasecurity/trivy-db --java-db-repository public.ecr.aws/aquasecurity/trivy-java-db:1 --checks-bundle-repository public.ecr.aws/aquasecurity/trivy-checks --timeout 15m --exit-code 1 --severity HIGH,CRITICAL
        always_run: true
        pass_filenames: false
        stages: [manual, pre-push] # Skip in local pre-commit, run in CI or manually
        description: "Comprehensive security scan for vulnerabilities, misconfigurations, and secrets using Trivy."

      - id: checkov
        name: checkov iac security audit
        language: system
        entry: unirtm hook-exec checkov --directory . --quiet --compact --soft-fail-on HIGH
        types_or: [yaml, dockerfile, terraform]
        pass_filenames: false
        stages: [manual, pre-push] # Skip in local pre-commit, run in CI or manually
        description: "Audit Infrastructure-as-Code (Terraform, K8s, Docker) for security best practices."

      - id: semgrep
        name: semgrep security scan
        language: system
        entry: unirtm hook-exec semgrep scan --config auto --error --quiet
        always_run: true
        pass_filenames: false
        description: "Multi-language static analysis for security, bugs, and best practices using Semgrep."

      - id: govulncheck
        name: govulncheck go vulnerability audit
        language: system
        entry: unirtm hook-exec govulncheck ./...
        types: [go]
        pass_filenames: false
        description: "Official Go vulnerability checker for source code and dependencies."

      - id: npm-pnpm-audit
        name: node ecosystem audit
        language: system
        entry: unirtm hook-exec node-audit
        files: '(pnpm-lock\.yaml|package-lock\.json|yarn\.lock|bun\.lockb)$'
        pass_filenames: false
        stages: [manual] # Temporarily disabled due to pnpm 10.30.3 audit API compatibility issue
        description: "Audit Node.js ecosystem dependencies for known vulnerabilities."

      # -- Hardening & Security ----------------------------------------------
      - id: check-executables-have-shebangs
        name: check shell scripts for shebangs
        entry: scripts/pre-commit/check-executables-have-shebangs.py
        language: system
        types: [text]
        exclude_types: [json, yaml, toml, markdown, html, css, javascript, ts, tsx, vue, astro, svelte, image]
        exclude: |
          (?x)^(
            .*\.bat|.*\.ps1|.*\.cmd|.*\.exe|
            .*\.txt|.*\.pdf|.*\.docx?|.*\.ini|.*\.editorconfig|.*\.properties|.*\.env.*|
            .*\.lock|.*\.lockb|.*\.sum|.*\.resolved|
            \.gitignore|\.gitattributes|Makefile|LICENSE
          )$
        description: "Executable scripts MUST start with a shebang (!#)."

      - id: check-shebang-scripts-are-executable
        name: check shebang scripts are executable
        entry: scripts/pre-commit/check-shebang-scripts-are-executable.py
        language: system
        types: [text]
        exclude_types: [json, yaml, toml, markdown, html, css, javascript, ts, tsx, vue, astro, svelte, image]
        exclude: |
          (?x)^(
            .*\.bat|.*\.ps1|.*\.cmd|.*\.exe|
            .*\.txt|.*\.pdf|.*\.docx?|.*\.ini|.*\.editorconfig|.*\.properties|.*\.env.*|
            .*\.lock|.*\.lockb|.*\.sum|.*\.resolved|
            \.gitignore|\.gitattributes|Makefile|LICENSE
          )$
        description: "Scripts with shebangs MUST have the executable bit set."

      - id: license-check
        name: check license headers
        language: system
        entry: unirtm exec -- unirtm license check -f .github/license-header.txt
        files: ^(src|pkg|internal|cmd|app|lib|include|tests)/
        types_or:
          [
            go,
            shell,
            python,
            javascript,
            jsx,
            ts,
            tsx,
            vue,
            svelte,
            astro,
            java,
            kotlin,
            swift,
            objective-c,
            objective-c++,
            c,
            c++,
            rust,
            ruby,
            php,
            c#,
            f#,
            dart,
          ]
        exclude: |
          (?x)^(
            scripts/.*\.(sh|ps1|bat)$
          )/.*
        description: "High-performance incremental compliance: Verify staged files for a SnowdreamTech license header."

      - id: forbidden-files
        name: check forbidden files
        entry: scripts/pre-commit/forbidden-files.py
        language: system
        stages: [pre-commit, pre-merge-commit]
        description: "Prevent accidental commit of temporary or merge-remnant files."

      - id: check-lockfile-conflicts
        name: check lockfile conflicts
        entry: scripts/pre-commit/check-lockfile-conflicts.py
        language: system
        files: '(\-lock\.json|lock\.yaml|Cargo\.lock|go\.sum|composer\.lock|package-lock\.json|bun\.lockb|pubspec\.lock|Package\.resolved|flake\.lock|dvc\.lock)$'
        description: "Mandatory check for merge conflict markers in large lockfiles (no size limit)."

      - id: check-lockfile-coexistence
        name: check lockfile coexistence
        entry: scripts/pre-commit/check-lockfile-coexistence.py
        language: system
        files: '(package-lock\.json|pnpm-lock\.yaml|yarn\.lock|bun\.lockb)$'
        description: "Prevent accidental coexistence of multiple Node.js package manager lockfiles."

      # -- Linting & Quality (Language Specific) ------------------------------
      - id: eslint
        name: eslint quality check
        language: system
        entry: unirtm hook-exec eslint --fix
        types_or:
          - javascript
          - ts
          - tsx
          - jsx
          - vue
        description: "Find and fix problems in JavaScript/TypeScript/Vue code."

      - id: yamllint
        name: yamllint
        language: system
        entry: unirtm hook-exec yamllint --config-file .yamllint.yml
        types: [yaml]
        description: "Lint YAML files based on strict project rules."

      - id: markdownlint-cli2
        name: markdownlint-cli2
        language: system
        entry: bash -c 'if unirtm which markdownlint-cli2 >/dev/null 2>&1; then printf "%s\\0" "$@" | xargs -0 -s 7000 unirtm exec -- markdownlint-cli2 --fix; else echo "Skipped markdownlint-cli2 not found"; fi' markdownlint-cli2
        types: [markdown]
        description: "Ensure Markdown follows project style guides."

      - id: shellcheck
        name: shellcheck
        language: system
        entry: unirtm hook-exec shellcheck
        types: [shell]
        exclude: |
          (?x)^(
            test_activate\.sh
          )
        description: "Posix-compliant ShellCheck for shell code quality."

      - id: shellcheck-posix
        name: shellcheck posix
        language: system
        entry: unirtm hook-exec shellcheck --shell=sh
        types: [shell]
        exclude: |
          (?x)^(
            tests/.*\.(sh|bats)$|
            test_activate\.sh
          )
        description: "Enforce strict POSIX compliance for shell scripts (Rule 01.3.39). Test files are excluded as they use bash features."

      - id: psscriptanalyzer
        name: PSScriptAnalyzer
        language: system
        entry: unirtm hook-exec psscriptanalyzer
        args:
          - -NoProfile
          - -Command
          - "& { if (!(Get-Command Invoke-ScriptAnalyzer -ErrorAction SilentlyContinue)) { exit 0 }; $r = $args | ForEach-Object { Invoke-ScriptAnalyzer -Path $_ -Settings PSScriptAnalyzerSettings.psd1 -Severity Error,Warning }; if ($r) { $r | Format-Table -AutoSize; exit 1 } }"
        types: [powershell]
        description: "PowerShell static analysis tool (macOS/Windows)."

      - id: actionlint
        name: check github actions
        language: system
        entry: unirtm hook-exec actionlint --shellcheck=
        files: ^\.github/workflows/.*\.yml$
        description: "Validate GitHub Actions workflow syntax."

      # -- Infrastructure & Config -------------------------------------------
      - id: dockerfile-utils
        name: dockerfile quality check
        language: system
        entry: unirtm hook-exec dockerfile-utils lint
        files: Dockerfile
        description: "Validate Dockerfile syntax and best practices."

      - id: editorconfig-checker
        name: editorconfig quality check
        language: system
        entry: unirtm hook-exec editorconfig-checker
        description: "Ensure compliance with .editorconfig rules across the project."

      - id: goreleaser-check
        name: goreleaser check
        language: system
        entry: unirtm hook-exec goreleaser check
        files: ^\.goreleaser\.ya?ml$
        pass_filenames: false
        description: "Check GoReleaser configuration."

      - id: commitlint
        name: check commit message format
        language: system
        entry: unirtm hook-exec commitlint --edit
        always_run: true
        stages: [commit-msg]
        description: "Enforce Conventional Commits specification for commit messages."
