---
# =====================================================================
# playbooks/scenarios/foundation.yml
#
# Purpose:
#   Deploys the basic foundation software stack and environment.
#   Replaces the legacy base.yml and init.yml playbooks.
# =====================================================================

- name: Deploy System Foundation
  hosts: all
  become: "{{ become_enabled | default(false, true) | bool }}"
  gather_facts: false

  tasks:
    - name: "Scenario: Bootstrap Environment (Install Python if missing)"
      ansible.builtin.include_role:
        name: bootstrap

    - name: Load infrastructure context
      ansible.builtin.include_role:
        name: context

    - name: DEBUG become_enabled
      ansible.builtin.debug:
        msg:
          - "become_enabled is: {{ become_enabled }}"
          - "type: {{ become_enabled | type_debug }}"
          - "is_root_user: {{ is_root_user | default('UNDEFINED') }}"
          - "os_family: {{ ansible_facts.os_family | default('UNDEFINED') }}"

    - name: "Scenario: Execute Foundation via App Dispatcher"
      ansible.builtin.include_role:
        name: app
      vars:
        app_name: "foundation"
        app_delivery_mode: "native"
