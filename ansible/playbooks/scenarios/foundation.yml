---
# =====================================================================
# playbooks/scenarios/foundation.yml
#
# Purpose:
#   Deploys the basic foundation software stack and environment.
#   Replaces the legacy base.yml and init.yml playbooks.
# =====================================================================

- name: Deploy System Foundation
  hosts: all
  # WHY: Do NOT set become at the play level using become_enabled here.
  # become_enabled is computed by the 'context' role, which runs AFTER
  # the play starts. Play-level become is evaluated at startup, before
  # context executes, so become_enabled would always default to false.
  # Each role/task that needs privilege escalation uses its own
  # become: "{{ become_enabled }}" which is evaluated at runtime, after
  # context has correctly set the value.
  become: false
  gather_facts: false

  tasks:
    - name: "Scenario: Bootstrap Environment (Install Python if missing)"
      ansible.builtin.include_role:
        name: bootstrap

    - name: Load infrastructure context
      ansible.builtin.include_role:
        name: context

    - name: "Scenario: Execute Foundation via App Dispatcher"
      ansible.builtin.include_role:
        name: app
      vars:
        app_name: "foundation"
        app_delivery_mode: "native"
