---
# =====================================================================
# crio_cleanup_loader.yml
#
# Enterprise-grade loader for cleaning CRI-O unused resources with full
# audit logging and cross-distro consistency.
#
# Features:
# - Clean orphaned sandboxes
# - Clean unused containers
# - Clean unused images
# - Clean CNI leftovers
# - Fully idempotent and safe for CI/CD and production automation
# - Full audit logging via log_loader
#
# =====================================================================

# ---------------------------------------------------------------------
# Cleanup orphaned sandboxes
# ---------------------------------------------------------------------

- name: "Cleanup CRI-O orphaned sandboxes"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "crictl pods --quiet | xargs -r crictl stoppod"
  register: crio_cleanup_pods
  changed_when: "'stopped' in crio_cleanup_pods.stdout"
  failed_when: false

# ---------------------------------------------------------------------
# Cleanup unused containers
# ---------------------------------------------------------------------

- name: "Cleanup CRI-O unused containers"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "crictl ps -a --quiet | xargs -r crictl rm"
  register: crio_cleanup_containers
  changed_when: "'Deleted' in crio_cleanup_containers.stdout"
  failed_when: false

# ---------------------------------------------------------------------
# Cleanup unused images
# ---------------------------------------------------------------------

- name: "Cleanup CRI-O unused images"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "crictl images --quiet | xargs -r crictl rmi"
  register: crio_cleanup_images
  changed_when: "'Deleted' in crio_cleanup_images.stdout"
  failed_when: false

# ---------------------------------------------------------------------
# Cleanup CNI leftovers
# ---------------------------------------------------------------------

- name: "Cleanup CRI-O CNI leftovers"
  become: "{{ become_enabled }}"
  ansible.builtin.command: "find /var/lib/cni -type f -delete"
  register: crio_cleanup_cni
  changed_when: false
  failed_when: false

