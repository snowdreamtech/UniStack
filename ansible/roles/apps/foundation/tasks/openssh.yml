---
# =====================================================================
# roles/init/tasks/openssh.yml
#
# Purpose:
#   Install and secure the OpenSSH daemon.
# =====================================================================

- name: "DEBUG init_openssh_packages"
  ansible.builtin.debug:
    msg: "init_openssh_packages IS {{ init_openssh_packages | default('NOT_DEFINED') }}"

- name: "Install OpenSSH Packages via Native Engine"
  ansible.builtin.include_role:
    name: native
  vars:
    native_app_name: "openssh"
    native_app_packages: "{{ init_openssh_packages | default([], true) }}"

- name: "Generate SSH host keys (Critical for Containers)"
  ansible.builtin.command: "ssh-keygen -t {{ item.type }} -f {{ item.path }} -N ''"
  args:
    creates: "{{ item.path }}"
  loop:
    - { type: "rsa", path: "/etc/ssh/ssh_host_rsa_key" }
    - { type: "ecdsa", path: "/etc/ssh/ssh_host_ecdsa_key" }
    - { type: "ed25519", path: "/etc/ssh/ssh_host_ed25519_key" }
  become: "{{ become_enabled }}"
  changed_when: false
  when: "(os_family | default('') | lower) != 'darwin'"

- name: "Load controller public keys"
  ansible.builtin.set_fact:
    controller_public_keys:
      - "{{ lookup('ansible.builtin.file', '~/.ssh/id_ed25519.pub', errors='ignore') }}"
      - "{{ lookup('ansible.builtin.file', '~/.ssh/id_rsa.pub', errors='ignore') }}"
      - "{{ lookup('ansible.builtin.file', '~/.ssh/id_ecdsa.pub', errors='ignore') }}"
  when: "(os_family | default('') | lower) != 'darwin'"

- name: "Add controller keys to authorized_keys"
  ansible.builtin.authorized_key:
    user: "{{ init_user_name }}"
    key: "{{ item }}"
    state: "present"
    exclusive: false
  loop: "{{ controller_public_keys | reject('equalto', '') | list }}"
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) != 'darwin'"

- name: "Ensure sshd_config.d directory exists"
  ansible.builtin.file:
    path: "/etc/ssh/sshd_config.d"
    state: directory
    owner: "{{ unistack_root_user }}"
    group: "{{ unistack_root_group }}"
    mode: "0755"
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) != 'darwin'"

- name: "Ensure sshd_config includes sshd_config.d directory"
  ansible.builtin.lineinfile:
    path: "/etc/ssh/sshd_config"
    line: "Include /etc/ssh/sshd_config.d/*.conf"
    insertbefore: BOF
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) != 'darwin'"
  register: sshd_config_main

- name: "Deploy OpenSSH hardening configuration"
  ansible.builtin.template:
    src: "../templates/99-hardening.conf.j2"
    dest: "/etc/ssh/sshd_config.d/99-hardening.conf"
    owner: "{{ unistack_root_user }}"
    group: "{{ unistack_root_group }}"
    mode: "0600"
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) != 'darwin'"
  register: sshd_config_hardening

- name: "Manage OpenSSH Service via Native Engine"
  ansible.builtin.include_role:
    name: native
  vars:
    native_app_name: "openssh"
    native_app_packages: "{{ init_openssh_packages | default([], true) }}"
    native_app_state: "{{ 'restarted' if (sshd_config_main is changed or sshd_config_hardening is changed) else 'started' }}"
    native_app_service: "{{ init_sshd_service | default('sshd', true) }}"
    native_app_service_enabled: true
