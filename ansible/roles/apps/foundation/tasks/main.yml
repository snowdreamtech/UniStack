---
# =====================================================================
# roles/apps/foundation/tasks/main.yml
#
# Purpose:
#   Application Definition for "Foundation" (System Baseline).
#   Uses os_loader to load environment variables, then delegates
#   installation to the L2 native engine.
# =====================================================================

- name: "Foundation: Load OS-specific variables"
  ansible.builtin.include_role:
    name: core
    tasks_from: os_loader
  vars:
    core_loader_type: "vars"
    core_loader_path: "vars"

- name: "Foundation: Ensure base packages are installed via Native Engine"
  ansible.builtin.include_role:
    name: native
  vars:
    native_app_name: "foundation"
    native_app_packages: "{{ foundation_packages | default([]) }}"
    native_app_state: "present"

# ---------------------------------------------------------------------
# Foundation Stages (formerly roles/init)
# ---------------------------------------------------------------------
- name: "Foundation: Configure Sudo"
  ansible.builtin.include_tasks: "sudo.yml"

- name: "Foundation: Configure Repositories"
  ansible.builtin.include_tasks: "repositories.yml"

- name: "Foundation: Configure Mirror"
  ansible.builtin.include_tasks: "mirror.yml"
  when: init_mirror_enabled | default(false, true)

- name: "Foundation: Provision User"
  ansible.builtin.include_tasks: "user.yml"

- name: "Foundation: Configure OpenSSH"
  ansible.builtin.include_tasks: "openssh.yml"
