---
# =====================================================================
# roles/init/defaults/main.yml
# =====================================================================

# ---------------------------------------------------------------------
# Base Features
# ---------------------------------------------------------------------
init_mirror_enabled: false

# ---------------------------------------------------------------------
# Mirror Source URLs (Used only when init_mirror_enabled: true)
# ---------------------------------------------------------------------
init_mirror_url_alpine: "https://mirrors.tuna.tsinghua.edu.cn/alpine"
init_mirror_url_debian: "https://mirrors.tuna.tsinghua.edu.cn/debian"
init_mirror_url_debian_security: "https://mirrors.tuna.tsinghua.edu.cn/debian-security"
init_mirror_url_ubuntu: "https://mirrors.tuna.tsinghua.edu.cn/ubuntu"
init_mirror_url_centos: "https://mirrors.tuna.tsinghua.edu.cn/centos"
init_mirror_url_epel: "https://mirrors.tuna.tsinghua.edu.cn/epel"

# ---------------------------------------------------------------------
# User Configuration
# ---------------------------------------------------------------------
init_user_name: "ansible"
# init_user_password: "$6$..." # Optional

# ---------------------------------------------------------------------
# SSH Configuration
# ---------------------------------------------------------------------
init_sshd_port: 22
init_sshd_permit_root_login: "no"
init_sshd_password_authentication: "yes"
---
# =====================================================================
# roles/base/defaults/main.yml
#
# Purpose:
#   Default variables for the base role.
#   Defines the core set of packages and system configurations
#   applied to every managed node.
#
# =====================================================================

# ---------------------------------------------------------------------
# Base Packages: Essential utilities required for system administration,
# networking, and basic automation tasks.
# This minimal list is overridden by OS-specific vars files.
# ---------------------------------------------------------------------
base_packages:
  - "sudo"
  - "procps"
  - "vim"
  - "zip"
  - "unzip"
  - "bzip2"
  - "xz-utils"
  - "file"
  - "gzip"
  - "jq"
  - "tzdata"
  - "openssl"
  - "gnupg"
  - "sysstat"
  - "wget"
  - "curl"
  - "git"
  - "lsof"
  - "ca-certificates"

# ---------------------------------------------------------------------
# Development Packages: Optional set of packages for development nodes.
# ---------------------------------------------------------------------
base_dev_packages: []

# ---------------------------------------------------------------------
# Git Configuration: Global identity and behavior settings.
# Override these in your playbook or inventory to customize.
# ---------------------------------------------------------------------
# git_user_name: ""
# git_user_email: ""
# git_editor: "vim"
# git_signing_key: ""
# git_signing: false

# ---------------------------------------------------------------------
# GitHub Proxy: Prefix for GitHub URLs (for China network acceleration).
# Set to "" to disable proxy.
# ---------------------------------------------------------------------
# github_proxy: ""

# ---------------------------------------------------------------------
# Homebrew: Force install on unsupported macOS versions (10.15-13).
# ---------------------------------------------------------------------
# homebrew_force_install: false
