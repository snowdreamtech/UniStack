---
# openEuler 24.03 LTS - RedHat-compatible, uses dnf
# No EPEL available; packages from openEuler official repos only
# openEuler has rich package ecosystem similar to RHEL9+
base_dev_packages: []
foundation_packages:
  - bash-completion
  - bzip2
  - ca-certificates
  - curl
  - file
  - fzf
  - git
  - gnupg2
  - gzip
  - htop
  - iproute
  - jq
  - lsof
  - make
  - openssl
  - patch
  - procps-ng
  - rsync
  - sudo
  - tmux
  - tree
  - tzdata
  - unzip
  - vim-enhanced
  - wget
  - xz
  - zip
