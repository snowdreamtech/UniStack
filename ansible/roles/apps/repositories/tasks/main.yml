---
- name: "Load OS-specific variables for this role"
  ansible.builtin.include_role:
    name: core
    tasks_from: os_loader
  vars:
    core_loader_type: "vars"
    core_loader_path: "vars"

# =====================================================================
# roles/init/tasks/repositories.yml
#
# Purpose:
#   Configure extra base repositories (e.g. EPEL for RedHat families).
#   Debian and Alpine are skipped here because their default repos
#   are sufficient unless mirror.yml is triggered.
# =====================================================================

# ---------------------------------------------------------------------
# RedHat: Enable EPEL Repository
# ---------------------------------------------------------------------
- name: "Install dnf-plugins-core for config-manager (EL8)"
  ansible.builtin.command: "dnf install -y dnf-plugins-core"
  changed_when: "'Nothing to do' not in _result.stdout"
  register: _result
  when:
    - os_family == 'redhat'
    - os_version_major | default('0', true) == '8'
    - os_distribution_id not in ['fedora', 'amzn', 'amazon', 'rhel', 'openeuler', 'alinux']
  become: "{{ become_enabled }}"

- name: "Install dnf-plugins-core for config-manager (EL9+)"
  ansible.builtin.package:
    name: "dnf-plugins-core"
    state: "present"
  when:
    - os_family == 'redhat'
    - os_version_major | default('0', true) != '8'
    - os_version_major | int >= 8
    - os_distribution_id not in ['fedora', 'amzn', 'amazon', 'rhel', 'openeuler', 'alinux']
  become: "{{ become_enabled }}"

- name: "Enable CRB/PowerTools repository for EPEL dependencies"
  ansible.builtin.command: "dnf config-manager --set-enabled crb"
  changed_when: false
  failed_when: false
  when:
    - os_family == 'redhat'
    - os_version_major | int >= 8
    - os_distribution_id not in ['fedora', 'amzn', 'amazon', 'rhel', 'openeuler', 'alinux']
  become: "{{ become_enabled }}"

- name: "Install EPEL repository (EL8)"
  ansible.builtin.command: "dnf install -y epel-release"
  changed_when: "'Nothing to do' not in _result.stdout"
  register: _result
  when:
    - os_family == 'redhat'
    - os_version_major | default('0', true) == '8'
    - os_distribution_id not in ['fedora', 'amzn', 'amazon', 'rhel', 'openeuler', 'alinux']
  become: "{{ become_enabled }}"

- name: "Install EPEL repository (EL9+)"
  ansible.builtin.package:
    name: "epel-release"
    state: "present"
  when:
    - os_family == 'redhat'
    - os_version_major | default('0', true) != '8'
    - os_distribution_id not in ['fedora', 'amzn', 'amazon', 'rhel', 'openeuler', 'alinux']
  become: "{{ become_enabled }}"

- name: "Install EPEL repository (RHEL/UBI fallback EL8)"
  ansible.builtin.command: "dnf install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-8.noarch.rpm"
  changed_when: "'Nothing to do' not in _result.stdout"
  register: _result
  when:
    - os_family == 'redhat'
    - os_version_major | default('0', true) == '8'
    - os_distribution_id == 'rhel'
  become: "{{ become_enabled }}"

- name: "Install EPEL repository (RHEL/UBI fallback EL9+)"
  ansible.builtin.package:
    name: "https://dl.fedoraproject.org/pub/epel/epel-release-latest-{{ os_version_major | default('9', true) }}.noarch.rpm"
    state: "present"
    disable_gpg_check: true
  when:
    - os_family == 'redhat'
    - os_version_major | default('0', true) != '8'
    - os_distribution_id == 'rhel'
  become: "{{ become_enabled }}"

- name: "Configure Repositories Context"
  ansible.builtin.debug:
    msg: "Starting repository configuration"
