---
# =====================================================================
# roles/context/tasks/detect_system.yml
#
# Purpose:
#   Detect intrinsic system capabilities and attributes.
# =====================================================================

# ---------------------------------------------------------------------
# Locality Detection
# ---------------------------------------------------------------------
- name: "Build is_localhost variable"
  ansible.builtin.set_fact:
    is_localhost: >-
      {{
        (ansible_connection | default('ssh', true)) == 'local'
        or (ansible_host | default('', true) in ['127.0.0.1', '127.0.1.1', '::1'])
        or inventory_hostname in ['localhost', 'localhost.localdomain']
      }}
  tags: ["always"]

# ---------------------------------------------------------------------
# Init System Detection
# ---------------------------------------------------------------------
- name: "Detect init system"
  ansible.builtin.set_fact:
    detect_init_system: >-
      {{ ansible_facts.service_mgr | default('unknown', true) }}
  tags: ["always"]

# ---------------------------------------------------------------------
# Cgroups Version (Linux only)
# ---------------------------------------------------------------------
- name: "Read cgroup version info"
  ansible.builtin.command: "awk -F: '/^0::/ {print $3}' /proc/self/cgroup"
  register: detect_cgroup
  changed_when: false
  failed_when: false
  become: "{{ become_enabled }}"
  when: os_family != 'darwin'
  tags: ["always"]

- name: "Identify effective cgroup version"
  ansible.builtin.set_fact:
    detect_cgroup_version: >-
      {{ 'none' if (os_family == 'darwin') else
      ('v2' if (detect_cgroup.stdout | default('', true) == '/') else 'v1') }}
  tags: ["always"]

# ---------------------------------------------------------------------
# WSL Detection (Linux only)
# ---------------------------------------------------------------------
- name: "Identify WSL environment"
  ansible.builtin.command: "grep -i microsoft /proc/version"
  register: detect_wsl_check
  changed_when: false
  failed_when: false
  become: "{{ become_enabled }}"
  when: os_family != 'darwin'
  tags: ["always"]

- name: "Persist WSL detection state"
  ansible.builtin.set_fact:
    detect_wsl: "{{ (detect_wsl_check.rc | default(1) == 0) if os_family != 'darwin' else false }}"
  tags: ["always"]
