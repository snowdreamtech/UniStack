---
# =====================================================================
# roles/context/tasks/main.yml
#
# Purpose:
#   Unified facts loader. Orchestrates fundamental system context.
#
# Usage:
#   - ansible.builtin.include_role:
#       name: "context"
#
# Debug (optional, not loaded by default):
#   - ansible.builtin.include_role:
#       name: "context"
#       tasks_from: "facts_inspect_loader"
# =====================================================================

# Stage 1: Core OS Facts & Architecture Normalization
- ansible.builtin.import_tasks: facts_os.yml

# Stage 2: Identity & Permissions
- ansible.builtin.import_tasks: facts_context.yml

# Stage 3: Context Mark Loaded
- name: "Mark context as fully loaded"
  ansible.builtin.set_fact:
    _unistack_context_loaded: true
  tags: ["always"]
