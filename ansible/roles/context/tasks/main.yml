---
# =====================================================================
# roles/context/tasks/main.yml
#
# Purpose:
#   Unified facts loader. Orchestrates system context through 4 stages.
#
# Usage:
#   - ansible.builtin.include_role:
#       name: "context"
#
# Debug (optional, not loaded by default):
#   - ansible.builtin.include_role:
#       name: "context"
#       tasks_from: "facts_inspect_loader"
# =====================================================================

# Stage 1: Core OS Facts & Architecture Normalization
- ansible.builtin.import_tasks: facts_os.yml

# Stage 2: Identity, Permissions, Tags, Paths
- ansible.builtin.import_tasks: facts_context.yml

# Stage 3: System Capabilities (Init, WSL, Cgroup, Localhost)
- ansible.builtin.import_tasks: detect_system.yml

# Stage 4: Container Runtime Detection
- ansible.builtin.import_tasks: detect_container.yml
