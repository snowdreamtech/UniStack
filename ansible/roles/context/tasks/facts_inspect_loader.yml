---
# =====================================================================
# roles/context/tasks/facts_inspect_loader.yml
#
# Purpose:
#   Inspection of Ansible facts for debugging and auditing.
#   Allows printing either a curated list of common OS facts or the
#   entire ansible_facts dictionary in a readable YAML format.
#
# Usage:
#   - ansible.builtin.include_role:
#       name: context
#       tasks_from: facts_inspect_loader
# =====================================================================

- name: "Set default mode to common"
  ansible.builtin.set_fact:
    facts_mode: "{{ mode | default('common', true) }}"
  tags: ["always"]

- name: "Build grouped common facts"
  ansible.builtin.set_fact:
    grouped_facts:
      OS_Base:
        os_family: "{{ os_family | default('undefined', true) }}"
        os_architecture_oci: "{{ os_architecture_oci | default('undefined', true) }}"
        is_container: "{{ is_container | default(false, true) }}"

      Context_Identity:
        is_root_user: "{{ is_root_user | default(false, true) }}"
        become_enabled: "{{ become_enabled | default(false, true) }}"

  when:
    - facts_mode == "common"
  tags: ["always"]

- name: "Convert grouped_facts to YAML"
  ansible.builtin.set_fact:
    facts_output: "{{ grouped_facts | to_nice_yaml(indent=2) }}"
  when:
    - facts_mode == "common"
  tags: ["always"]

- name: "Convert full ansible_facts to YAML"
  ansible.builtin.set_fact:
    facts_output: "{{ ansible_facts | to_nice_yaml(indent=2) }}"
  when:
    - facts_mode == "full"
  tags: ["always"]

- name: "Print facts output"
  ansible.builtin.debug:
    msg: "[FACTS_{{ facts_mode | upper }}]\n{{ facts_output }}"
