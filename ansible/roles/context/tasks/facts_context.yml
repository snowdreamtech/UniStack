---
# =====================================================================
# roles/context/tasks/facts_context.yml
#
# Purpose:
#   Derive context variables: Identity and Permissions.
# =====================================================================

# ---------------------------------------------------------------------
# System Identity and Permissions
# ---------------------------------------------------------------------
- name: "Build context identity facts"
  ansible.builtin.set_fact:
    unistack_root_user: "{{ computed_root_user }}"
    unistack_root_group: >-
      {%- if (os_family | default('') | lower) == 'windows' -%}
        Administrators
      {%- elif (os_family | default('') | lower) in ['darwin', 'freebsd', 'openbsd', 'netbsd', 'dragonfly'] -%}
        wheel
      {%- else -%}
        root
      {%- endif -%}
    is_root_user: "{{ current_user == computed_root_user }}"
    become_enabled: >-
      {{
        (not (current_user == computed_root_user))
        and not (
          (ansible_facts.os_family | default('') | lower) == 'darwin'
          and (ansible_pkg_mgr | default('homebrew') | lower) == 'homebrew'
        )
      }}
  vars:
    computed_root_user: "{{ 'Administrator' if (os_family | default('') | lower) == 'windows' else 'root' }}"
    current_user: "{{ ansible_user_id | default(ansible_env.USER | default('unknown', true), true) }}"
  tags: ["always"]
