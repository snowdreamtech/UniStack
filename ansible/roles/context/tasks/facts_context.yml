---
# =====================================================================
# roles/context/tasks/facts_context.yml
#
# Purpose:
#   Derive context variables: Identity and Permissions.
# =====================================================================

# ---------------------------------------------------------------------
# System Root Identity
# ---------------------------------------------------------------------
- name: "Build system root user and group"
  ansible.builtin.set_fact:
    unistack_root_user: "{{ 'Administrator' if (os_family | default('') | lower) == 'windows' else 'root' }}"
    unistack_root_group: >-
      {%- if (os_family | default('') | lower) == 'windows' -%}
        Administrators
      {%- elif (os_family | default('') | lower) in ['darwin', 'freebsd', 'openbsd', 'netbsd', 'dragonfly'] -%}
        wheel
      {%- else -%}
        root
      {%- endif -%}
  tags: ["always"]

# ---------------------------------------------------------------------
# Identity Detection
# ---------------------------------------------------------------------
- name: "Build is_root_user"
  ansible.builtin.set_fact:
    is_root_user: "{{ (ansible_user_id | default(ansible_env.USER | default(unistack_root_user, true), true)) == unistack_root_user }}"
  tags: ["always"]

# ---------------------------------------------------------------------
# Permission Strategy
# ---------------------------------------------------------------------
- name: "Build become_enabled"
  ansible.builtin.set_fact:
    become_enabled: >-
      {{
        (not (is_container | default(false, true)))
        and (not (is_root_user | default(false, true)))
      }}
  tags: ["always"]
