---
# =====================================================================
# roles/context/tasks/facts_os.yml
#
# Purpose:
#   Core OS fact gathering and architecture normalization.
#   Only extracts what Ansible does not natively provide.
# =====================================================================

# ---------------------------------------------------------------------
# Collection: Refresh system facts
# ---------------------------------------------------------------------
- name: "Refresh system facts"
  ansible.builtin.setup:
  become: false
  register: facts_result
  retries: 3
  delay: 2
  until: facts_result is succeeded
  tags: ["always"]

# ---------------------------------------------------------------------
# OS Basics: Only what downstream tasks truly need
# ---------------------------------------------------------------------
- name: "Build essential OS facts"
  ansible.builtin.set_fact:
    os_family: "{{ ansible_facts.os_family | lower }}"
    os_architecture: "{{ ansible_facts.architecture }}"
    is_container: >-
      {{
        ansible_facts.virtualization_type | default('', true)
        in ['docker', 'lxc', 'container', 'containerd', 'podman', 'proot']
      }}
  tags: ["always"]

# ---------------------------------------------------------------------
# Architecture Normalization (OCI/Docker/Go style)
# ---------------------------------------------------------------------
- name: "Normalize architecture map"
  ansible.builtin.set_fact:
    architecture_map: >-
      {{
        {
          'x86_64': 'amd64',
          'aarch64': 'arm64',
          'armv7l': 'armv7',
          'armv6l': 'armv6',
          'ppc64le': 'ppc64le',
          'ppc64': 'ppc64',
          'riscv64': 'riscv64',
          's390x': 's390x',
          'loongarch64': 'loongarch64',
          'mips64': 'mips64',
          'mips': 'mips'
        }
        | combine(architecture_map | default({}, true))
      }}
  tags: ["always"]

- name: "Set normalized architecture (OCI/Docker/Go style)"
  ansible.builtin.set_fact:
    os_architecture_oci: >-
      {{
        architecture_map[os_architecture]
        | default(os_architecture, true)
      }}
  tags: ["always"]
