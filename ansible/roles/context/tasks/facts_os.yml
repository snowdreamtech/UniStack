---
# =====================================================================
# roles/context/tasks/facts_os.yml
#
# Purpose:
#   Core OS fact gathering and architecture normalization.
#   Only extracts what Ansible does not natively provide.
# =====================================================================

# ---------------------------------------------------------------------
# Collection: Ensure facts are gathered
# ---------------------------------------------------------------------
- name: "Refresh system facts"
  ansible.builtin.setup:
  tags: ["always"]

- name: "Read /etc/os-release"
  ansible.builtin.slurp:
    src: "/etc/os-release"
  register: os_release_file
  ignore_errors: true
  tags: ["always"]

- name: "Parse OS Release ID"
  ansible.builtin.set_fact:
    _os_release_id: >-
      {{
        (os_release_file.content | b64decode | regex_search('^ID="?([^"\n]+)"?', '\\1', multiline=True) | first | lower)
        if not os_release_file.failed and os_release_file.content is defined else ''
      }}
  tags: ["always"]

# ---------------------------------------------------------------------
# OS Basics: Only what downstream tasks truly need
# ---------------------------------------------------------------------
- name: "Build essential OS facts"
  ansible.builtin.set_fact:
    os_family: "{{ ansible_facts.os_family | lower }}"
    os_distribution: "{{ ansible_facts.distribution | lower }}"
    os_distribution_id: "{{ _os_release_id | default('', true) }}"
    os_version_major: "{{ ansible_facts.distribution_major_version | string }}"
    os_version_minor: "{{ (ansible_facts.distribution_version.split('.')[1] | default('0', true)) if '.' in ansible_facts.distribution_version else '0' }}"
    os_version_code: "{{ ansible_facts.distribution_release | default('', true) | lower }}"
    is_container: >-
      {{
        ansible_facts.virtualization_type | default('', true)
        in ['docker', 'lxc', 'container', 'containerd', 'podman', 'proot']
      }}
  tags: ["always"]

# ---------------------------------------------------------------------
# Architecture Normalization
# ---------------------------------------------------------------------
- name: "Set normalized architecture (OCI/Docker/Go style)"
  ansible.builtin.set_fact:
    os_architecture_oci: >-
      {{
        architecture_map[ansible_facts.architecture]
        | default(ansible_facts.architecture, true)
      }}
  tags: ["always"]
