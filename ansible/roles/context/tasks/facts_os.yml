---
# =====================================================================
# roles/context/tasks/facts_os.yml
#
# Purpose:
#   Core OS fact gathering and architecture normalization.
#   Only extracts what Ansible does not natively provide.
# =====================================================================

# ---------------------------------------------------------------------
# Collection: Ensure facts are gathered
# ---------------------------------------------------------------------
- name: "Refresh system facts"
  ansible.builtin.setup:
  tags: ["always"]

# NixOS and some minimal containers may not have /etc/os-release
- name: "Check if /etc/os-release exists"
  ansible.builtin.stat:
    path: "/etc/os-release"
  register: os_release_stat
  changed_when: false
  tags: ["always"]

- name: "Read /etc/os-release"
  ansible.builtin.slurp:
    src: "/etc/os-release"
  register: os_release_file
  when: os_release_stat.stat.exists
  tags: ["always"]

# ---------------------------------------------------------------------
# OS Basics & Architecture Normalization
# ---------------------------------------------------------------------
- name: "Parse and build essential OS facts"
  ansible.builtin.set_fact:
    _os_release_id: "{{ computed_id }}"
    os_family: "{{ ansible_facts.os_family | default('', true) | lower }}"
    os_distribution: "{{ ansible_facts.distribution | default('', true) | lower }}"
    os_distribution_id: "{{ computed_id | default(ansible_facts.distribution | default('', true) | lower, true) }}"
    os_version_major: "{{ ansible_facts.distribution_major_version | default('0', true) | string }}"
    os_version_minor: "{{ (ansible_facts.distribution_version.split('.')[1] | default('0', true)) if ('distribution_version' in ansible_facts and '.' in ansible_facts.distribution_version) else '0' }}"
    os_version_code: "{{ ansible_facts.distribution_release | default('', true) | lower }}"
    is_container: >-
      {{
        ansible_facts.virtualization_type | default('', true)
        in ['docker', 'lxc', 'container', 'containerd', 'podman', 'proot']
      }}
    os_architecture_oci: >-
      {{
        architecture_map[ansible_facts.architecture]
        | default(ansible_facts.architecture, true)
      }}
    # When Ansible cannot detect pkg_mgr (returns 'unknown'), look up the distro
    # in the fallback map. Otherwise pass through the already-detected value.
    os_pkg_mgr: >-
      {%- if ansible_facts.pkg_mgr | default('unknown', true) == 'unknown' -%}
        {{ fallback_pkg_mgr_map[computed_id] | default('', true) }}
      {%- else -%}
        {{ ansible_facts.pkg_mgr }}
      {%- endif -%}
  vars:
    computed_id: >-
      {%- if 'content' in os_release_file -%}
        {%- set decoded = os_release_file.content | b64decode -%}
        {%- set match = decoded | regex_search('(?m)^ID=["\x27]?([^"\x27\n]+)["\x27]?', '\\1') -%}
        {%- if match and match | length > 0 -%}
          {{ match[0] | lower }}
        {%- else -%}
          {{ '' }}
        {%- endif -%}
      {%- else -%}
        {{ '' }}
      {%- endif -%}
  tags: ["always"]
