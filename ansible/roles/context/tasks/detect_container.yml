---
# =====================================================================
# roles/context/tasks/detect_container.yml
#
# Purpose:
#   Detect container runtime (Docker, Podman, Containerd) and
#   Kubernetes node presence.
# =====================================================================

# ---------------------------------------------------------------------
# Kubernetes Detection
# ---------------------------------------------------------------------
- name: "Detect kubelet binary presence"
  ansible.builtin.command: >
    /bin/sh -c "PATH={{ os_paths }} command -v kubelet 2>/dev/null || true"
  register: detect_kubelet
  changed_when: false
  failed_when: false
  become: "{{ become_enabled }}"
  tags: ["always"]

- name: "Persist Kubernetes node detection state"
  ansible.builtin.set_fact:
    detect_k8s_node: "{{ detect_kubelet.rc == 0 }}"
  tags: ["always"]

# ---------------------------------------------------------------------
# Runtime Discovery
# ---------------------------------------------------------------------
- name: "Locate container runtime binaries (Bulk)"
  ansible.builtin.shell: |-
    set -eu
    PATH="{{ os_paths }}"
    for b in docker podman containerd; do
      if command -v "$b" >/dev/null 2>&1; then
        echo "$b"
      fi
    done
  register: _runtimes_probe
  changed_when: false
  become: "{{ become_enabled }}"
  tags: ["always"]

# ---------------------------------------------------------------------
# Runtime Selection
# ---------------------------------------------------------------------
- name: "Auto-select available container engine"
  ansible.builtin.set_fact:
    container_engine_detected: >-
      {{
        'docker' if 'docker' in _runtimes_probe.stdout_lines
        else 'podman' if 'podman' in _runtimes_probe.stdout_lines
        else 'containerd' if 'containerd' in _runtimes_probe.stdout_lines
        else 'none'
      }}
  when:
    - container_engine is not defined
  tags: ["always"]

# ---------------------------------------------------------------------
# Finalization
# ---------------------------------------------------------------------
- name: "Finalize effective container_engine value"
  ansible.builtin.set_fact:
    container_engine: "{{ container_engine_detected | default('none', true) }}"
  tags: ["always"]
