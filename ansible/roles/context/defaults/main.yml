---
# =====================================================================
# roles/context/defaults/main.yml
#
# Purpose:
#   Global default variables for the native infrastructure layer.
#   Contains the core node_tags_map for deriving boolean architectural facts.
# =====================================================================

# =====================================================================
# Tag Metadata (for validation and documentation)
# =====================================================================
tag_metadata:
  version: "3.0"
  total_tags: 55
  categories: 8

  # Mutually exclusive tag groups
  conflicts:
    - [prod, dev, test, stage] # Environment conflicts

  # Deprecated tags (will be removed in future versions)
  deprecated:
    db_master: "Use db_primary instead"
    db_slave: "Use db_replica instead"

# =====================================================================
# Tag Map
# =====================================================================
tag_map:
  # =====================================================================
  # 1. Environment Classification
  # =====================================================================
  dev: is_dev # Development environment
  test: is_test # Testing environment
  stage: is_stage # Staging environment
  prod: is_prod # Production environment
  sandbox: is_sandbox # Sandbox/playground

  # =====================================================================
  # 2. Infrastructure Type
  # =====================================================================
  physical: is_physical # Physical server
  baremetal: is_baremetal # Bare metal (alias)
  vm: is_vm # Virtual machine
  cloud: is_cloud # Cloud instance
  container_node: is_container_node # Container-based

  # =====================================================================
  # 3. Application Role
  # =====================================================================
  web: is_web_node # Web server
  api: is_api_node # API server
  frontend: is_frontend_node # Frontend app
  backend: is_backend_node # Backend app
  worker: is_worker_node # Background worker
  cron: is_cron_node # Cron jobs
  db: is_db_node # Database
  db_primary: is_db_primary # DB primary/master
  db_replica: is_db_replica # DB replica
  cache: is_cache_node # Cache server
  queue: is_queue_node # Message queue
  storage: is_storage_node # Storage server
  bastion: is_bastion_node # Bastion host

  # =====================================================================
  # 4. Control & Managed Node
  # =====================================================================
  control: is_control_node # Ansible control node
  managed: is_managed_node # Ansible managed node

  # =====================================================================
  # 5. Container & Orchestration
  # =====================================================================
  container: is_container # Generic container
  docker_container: is_docker_container # Docker container
  podman_container: is_podman_container # Podman container
  docker_host: is_docker_host # Docker host
  podman_host: is_podman_host # Podman host
  k8s_node: is_k8s_node # K8s node
  k8s_control_plane: is_k8s_control_plane # K8s control plane
  k8s_worker: is_k8s_worker # K8s worker

  # =====================================================================
  # 6. CPU Architecture
  # =====================================================================
  x86_64: is_x86_64 # x86_64/AMD64
  amd64: is_amd64 # AMD64 (alias)
  arm64: is_arm64 # ARM64
  aarch64: is_aarch64 # AArch64 (alias)
  armv7: is_armv7 # ARMv7

  # =====================================================================
  # 7. Application Specific
  # =====================================================================
  git: is_git_node # Git
  zsh: is_zsh_node # Zsh
  curl: is_curl_node # Curl
  nginx: is_nginx_node # Nginx
  python: is_python_node # Python
  nvm: is_nvm_node # NVM
  node: is_node_node # Node.js
  go: is_go_node # Go
  fd: is_fd_node # fd
  pnpm: is_pnpm_node # pnpm

  # =====================================================================
  # 8. System Type
  # =====================================================================
  desktop: is_desktop # Desktop environment system
  server: is_server # Server system
  develop: is_develop # Develop environment system
  deploy: is_deploy # Deploy environment system
