---
# =====================================================================
# roles/context/defaults/main.yml
#
# Purpose:
#   Global default variables for the native infrastructure layer.
# =====================================================================

# ---------------------------------------------------------------------
# Architecture Normalization Map (OCI/Docker/Go style)
# ---------------------------------------------------------------------
architecture_map:
  "x86_64": "amd64"
  "aarch64": "arm64"
  "armv7l": "armv7"
  "armv6l": "armv6"
  "ppc64le": "ppc64le"
  "ppc64": "ppc64"
  "riscv64": "riscv64"
  "s390x": "s390x"
  "loongarch64": "loongarch64"
  "mips64": "mips64"
  "mips": "mips"

# ---------------------------------------------------------------------
# Fallback Package Manager Map
# Used when Ansible natively fails to detect the package manager (returns "unknown").
# Maps OS Release ID (e.g. from /etc/os-release) to the expected package manager.
# ---------------------------------------------------------------------
fallback_pkg_mgr_map:
  "azurelinux": "tdnf"
  "mariner": "tdnf"
