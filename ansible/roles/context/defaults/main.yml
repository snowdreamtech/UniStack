---
# =====================================================================
# roles/context/defaults/main.yml
#
# Purpose:
#   Global default variables for the native infrastructure layer.
#   Contains the core node_tags_map for deriving boolean architectural facts.
# =====================================================================

# =====================================================================
# Tag Metadata (for validation and documentation)
# =====================================================================
tag_metadata:
  version: "5.0"
  total_tags: 22
  categories: 5

  # Mutually exclusive tag groups
  conflicts:
    - [prod, dev, test, stage] # Environment conflicts

# =====================================================================
# Tag Map
# =====================================================================
tag_map:
  # =====================================================================
  # 1. Environment Classification
  # =====================================================================
  dev: is_dev # Development environment
  test: is_test # Testing environment
  stage: is_stage # Staging environment
  prod: is_prod # Production environment
  sandbox: is_sandbox # Sandbox/playground
  airgap: is_airgap # Air-gapped / disconnected network
  ci: is_ci_env # CI/CD automation environment

  # =====================================================================
  # 2. Infrastructure Type
  # =====================================================================
  physical: is_physical # Physical server
  vm: is_vm # Virtual machine
  wsl: is_wsl # Windows Subsystem for Linux

  # =====================================================================
  # 3. Control & Managed Node
  # =====================================================================
  control: is_control_node # Ansible control node
  managed: is_managed_node # Ansible managed node

  # =====================================================================
  # 4. Container & Orchestration
  # =====================================================================
  container: is_container # Generic container
  docker_container: is_docker_container # Docker container
  podman_container: is_podman_container # Podman container
  docker_host: is_docker_host # Docker host
  podman_host: is_podman_host # Podman host
  k8s_node: is_k8s_node # K8s node
  k8s_control_plane: is_k8s_control_plane # K8s control plane
  k8s_worker: is_k8s_worker # K8s worker

  # =====================================================================
  # 5. System Type
  # =====================================================================
  desktop: is_desktop # Desktop environment system
  server: is_server # Server system
