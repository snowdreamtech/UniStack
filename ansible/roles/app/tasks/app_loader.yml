---
# =====================================================================
# roles/app/tasks/app_loader.yml
#
# Purpose:
#   Integrated application loader inspired by os_loader and vars_loader.
#   - Hierarchical variable merging (Additive)
#   - Specialized OS-version aware tasks resolution
#   - Intelligent delivery mode auto-detection
# =====================================================================

# 0. Context Discovery (Ensure core facts are present)
# ---------------------------------------------------------------------
- ansible.builtin.include_role:
    name: "context"
  when: os_fingerprint is not defined

# 1. Basic Validation (app_name only)
# ---------------------------------------------------------------------
- name: "Validate app_name is provided"
  ansible.builtin.assert:
    that:
      - app_name is defined
      - app_name is string
      - (app_name | length) > 0
    fail_msg: |
      app_loader: app_name must be a non-empty string
      Received type: {{ app_name | type_debug if app_name is defined else 'undefined' }}
      Received value: {{ app_name | default('UNDEFINED', true) }}
    success_msg: "app_loader: app_name validated ({{ app_name | default('UNDEFINED') }})"
  tags: ["always"]

# 1.5 Load API Schema Variables
# ---------------------------------------------------------------------
- name: "Load API schema for {{ app_name }}"
  ansible.builtin.include_vars:
    file: "vars/api_schema.yml"
  tags: ["always"]

# 2. Reset Loader & API State
#    Prevent fact leakage from previous calls on the same host.
#    Only reset internal state variables, NOT user input parameters.
# ---------------------------------------------------------------------
- ansible.builtin.set_fact:
    "{{ loader_internal_item }}": null
  loop: "{{ app_api_internal_vars }}"
  loop_control:
    loop_var: loader_internal_item
    label: "reset {{ loader_internal_item }} (null)"
  tags: ["always"]

# ---------------------------------------------------------------------
# 3. Path Resolution & Base Discovery
#    Identify the source directory for application definitions.
# ---------------------------------------------------------------------
- name: "Resolve apps role base path"
  ansible.builtin.set_fact:
    resolved_app_source_path: >-
      {{
        app_source_path | default(
          app_role_path
            | default(((ansible_parent_role_paths | default([], true)) | first), true)
            | default(role_path | dirname ~ '/apps', true)
          ~ '/' ~ app_name, true
        )
      }}
  tags: ["always"]

- name: "Log base path resolution for {{ app_name }}"
  ansible.builtin.debug:
    msg: "App Source Path selected: {{ resolved_app_source_path }}"
  when: verbose | default(false, true) | bool
  tags: ["always"]

- name: "Verify app source existence at {{ resolved_app_source_path }}"
  ansible.builtin.stat:
    path: "{{ resolved_app_source_path }}"
  register: app_source_dir_stat
  delegate_to: localhost
  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
  tags: ["always"]

# ---------------------------------------------------------------------
# 4. Discovery: Presence Check
#    Check for vars, defaults, or tasks directories in the app source.
# ---------------------------------------------------------------------
- name: "Probe for custom definitions of {{ app_name }}"
  when: app_source_dir_stat.stat.exists | default(false, true)
  tags: ["always"]
  block:
    - name: "Detect structures for {{ app_name }}"
      ansible.builtin.stat:
        path: "{{ resolved_app_source_path }}/{{ loader_item }}"
      loop:
        - "defaults"
        - "vars"
        - "tasks"
      loop_control:
        loop_var: loader_item
      register: _app_mod_stat
      delegate_to: localhost
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
      tags: ["always"]

    - name: "Set custom existence facts for {{ app_name }}"
      ansible.builtin.set_fact:
        app_loader_custom_exists: >-
          {{
            (_app_mod_stat.results[0].stat.exists | default(false, true)) or
            (_app_mod_stat.results[1].stat.exists | default(false, true)) or
            (_app_mod_stat.results[2].stat.exists | default(false, true))
          }}
        app_defaults_path: "{{ resolved_app_source_path }}/defaults"
        app_vars_path: "{{ resolved_app_source_path }}/vars"
        app_tasks_path: "{{ resolved_app_source_path }}/tasks"
      when: app_source_dir_stat.stat.exists | default(false, true)
      tags: ["always"]

# ---------------------------------------------------------------------
# 5. State Initialization
# ---------------------------------------------------------------------
- name: "Initialize app loader state for {{ app_name }}"
  ansible.builtin.set_fact:
    app_tasks_file: ""
  tags: ["always"]

# ---------------------------------------------------------------------
# 6. Mode Auto-Detection
# ---------------------------------------------------------------------
- name: "Auto-detect app_delivery_mode for {{ app_name }}"
  ansible.builtin.set_fact:
    app_delivery_mode: >-
      {{
        'container' if (container_engine_available | default(false, true)) else 'native'
      }}
  when: (app_delivery_mode | default('auto', true)) == 'auto'
  tags: ["always"]

# ---------------------------------------------------------------------
# 7. Variable Hierarchy Loading (Additive)
# ---------------------------------------------------------------------
- name: "Load hierarchical variables for {{ app_name }}"
  ansible.builtin.include_vars:
    file: "{{ loader_item.path }}/{{ loader_item.file }}"
  loop:
    # Lowest Priority
    - { path: "{{ app_defaults_path | default('', true) }}", file: "main.yml" }
    - { path: "{{ app_defaults_path | default('', true) }}", file: "default.yml" }
    - { path: "{{ app_defaults_path | default('', true) }}", file: "{{ app_name }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "main.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "default.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ app_name }}.yml" }
    # 17. Ultimate Fallback (App context)
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/default.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}.yml" }
    # 16. Architecture Only
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ arch }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ arch }}.yml" }
    # 15. Generic Match: Distribution Name (Fallback if ID differs)
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ distro_name }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ distro_name }}.yml" }
    # 14. OS Family
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ family }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ family }}.yml" }
    # 13. Distro ID
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ distro }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ distro }}.yml" }
    # 12. OS Family + Arch
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ family }}_{{ arch }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ family }}_{{ arch }}.yml" }
    # 11. Distro ID + Arch
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ distro }}_{{ arch }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ distro }}_{{ arch }}.yml" }
    # 10. OS Family + Major Version
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ family }}_{{ version_major }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ family }}_{{ version_major }}.yml" }
    # 9. OS Family + Full Version
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ family }}_{{ version_major }}.{{ version_minor }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ family }}_{{ version_major }}.{{ version_minor }}.yml" }
    # 8. Distro ID + Major Version
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ distro }}_{{ version_major }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ distro }}_{{ version_major }}.yml" }
    # 7. Distro ID + Full Version
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ distro }}_{{ version_major }}.{{ version_minor }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ distro }}_{{ version_major }}.{{ version_minor }}.yml" }
    # 6. Distro ID + Version Code
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ distro }}_{{ version_code }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ distro }}_{{ version_code }}.yml" }
    # 5. OS Family + Major Version + Arch
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ family }}_{{ version_major }}_{{ arch }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ family }}_{{ version_major }}_{{ arch }}.yml" }
    # 4. OS Family + Full Version + Arch
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ family }}_{{ version_major }}.{{ version_minor }}_{{ arch }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ family }}_{{ version_major }}.{{ version_minor }}_{{ arch }}.yml" }
    # 3. Distro ID + Major Version + Arch
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ distro }}_{{ version_major }}_{{ arch }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ distro }}_{{ version_major }}_{{ arch }}.yml" }
    # 2. Distro ID + Full Version + Arch
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ distro }}_{{ version_major }}.{{ version_minor }}_{{ arch }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ distro }}_{{ version_major }}.{{ version_minor }}_{{ arch }}.yml" }
    # 1. Distro ID + Version Code + Arch
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ distro }}_{{ version_code }}_{{ arch }}.yml" }
    - { path: "{{ app_vars_path | default('', true) }}", file: "{{ mode }}/{{ distro }}_{{ version_code }}_{{ arch }}.yml" }
  vars:
    distro: "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}"
    distro_name: "{{ os_distribution | default('default', true) | lower | replace(' ', '_') }}"
    family: "{{ os_family | default('default', true) | lower | replace(' ', '_') }}"
    version_major: "{{ os_version_major | default('0', true) | string | lower | replace(' ', '_') }}"
    version_minor: "{{ os_version_minor | default('0', true) | string | lower | replace(' ', '_') }}"
    version_code: "{{ os_version_code | default('unknown', true) | lower | replace(' ', '_') }}"
    arch: "{{ os_architecture_oci | default('unknown', true) | lower }}"
    mode: "{{ app_delivery_mode }}"
  when:
    - app_loader_custom_exists | default(false, true)
    - loader_item.path | length > 0
    - "(lookup('first_found', {'paths': [loader_item.path], 'files': [loader_item.file]}, errors='ignore') | default('', true) | length) > 0"
  failed_when: false
  loop_control:
    loop_var: loader_item
  tags: ["always"]

# ---------------------------------------------------------------------
# 8. Variable Prefixing: Aggregate all variable prefixes to be used
#    in the subsequent merging step.
# ---------------------------------------------------------------------
- name: "Resolve effective variable prefixes for {{ app_name }}"
  ansible.builtin.set_fact:
    app_loader_effective_prefixes: >-
      {{
        app_var_prefixes
          | default([app_var_prefix | default(app_name, true)], true)
          | select('defined')
          | reject('none')
          | list
      }}
  tags: ["always"]

# ---------------------------------------------------------------------
# 9. Variable Merging (Explicit Combine)
#    Safely merge defaults and overrides for each variable prefix.
# ---------------------------------------------------------------------
- name: "Merge defaults/overrides for multiple objects in {{ app_name }}"
  ansible.builtin.set_fact:
    "{{ loader_item }}": >-
      {{
        (lookup('vars', loader_item ~ '_defaults', default={}))
        | combine(
            lookup('vars', loader_item ~ '_overrides', default={}),
            recursive=True
          )
      }}
  loop: "{{ app_loader_effective_prefixes | default([], true) }}"
  when:
    - loader_item is string
    - app_loader_custom_exists | default(false, true)
    - app_loader_effective_prefixes is defined
    - app_loader_effective_prefixes | length > 0
    - (
      lookup('vars', loader_item ~ '_defaults', default={}) is mapping
      or
      lookup('vars', loader_item ~ '_overrides', default={}) is mapping
      )
  loop_control:
    loop_var: loader_item
  tags: ["always"]

# ---------------------------------------------------------------------
# 10. API Mapping
#     Map merged variables from the primary app object to the unified
#     app_* API if they are not already set.
# ---------------------------------------------------------------------
- name: "Map merged variables to unified API for {{ app_name }}"
  ansible.builtin.set_fact:
    "{{ loader_var_item.key }}": "{{ loader_var_item.value }}"
  loop: "{{ lookup('vars', app_name, default={}) | dict2items }}"
  when:
    - app_loader_custom_exists | default(false, true)
    - lookup('vars', app_name, default={}) is mapping
    - loader_var_item.key.startswith('app_')
    - (hostvars[inventory_hostname].get(loader_var_item.key) | default('', true) | string | trim | length == 0)
  loop_control:
    loop_var: loader_var_item
  tags: ["always"]

# ---------------------------------------------------------------------
# 11. Normalization (Unified API state)
#     Apply defaults and convert types before validation.
# ---------------------------------------------------------------------
- ansible.builtin.import_tasks: "normalize.yml"

# ---------------------------------------------------------------------
# 12. Full API Validation
#     Validate all fields after normalization has set defaults.
# ---------------------------------------------------------------------
- ansible.builtin.import_tasks: "validate.yml"

# ---------------------------------------------------------------------
# 13. Task Resolution (Best Match)
# ---------------------------------------------------------------------
- name: "Resolve tasks file for {{ app_name }} ({{ app_delivery_mode }})"
  ansible.builtin.set_fact:
    app_tasks_file: "{{ lookup('first_found', params_tasks, errors='ignore') | default('', true) }}"
  vars:
    distro: "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}"
    distro_name: "{{ os_distribution | default('default', true) | lower | replace(' ', '_') }}"
    family: "{{ os_family | default('default', true) | lower | replace(' ', '_') }}"
    version_major: "{{ os_version_major | default('0', true) | string | lower | replace(' ', '_') }}"
    version_minor: "{{ os_version_minor | default('0', true) | string | lower | replace(' ', '_') }}"
    version_code: "{{ os_version_code | default('unknown', true) | lower | replace(' ', '_') }}"
    arch: "{{ os_architecture_oci | default('unknown', true) | lower }}"
    mode: "{{ app_delivery_mode }}"
    params_tasks:
      paths: ["{{ app_tasks_path | default('', true) }}"]
      files:
        # 1. Exact Match: Distro ID + Version Code + Arch
        - "{{ mode }}/{{ distro }}_{{ version_code }}_{{ arch }}.yml"
        - "{{ distro }}_{{ version_code }}_{{ arch }}.yml"
        # 2. Exact Match: Distro ID + Full Version + Arch
        - "{{ mode }}/{{ distro }}_{{ version_major }}.{{ version_minor }}_{{ arch }}.yml"
        - "{{ distro }}_{{ version_major }}.{{ version_minor }}_{{ arch }}.yml"
        # 3. Exact Match: Distro ID + Major Version + Arch
        - "{{ mode }}/{{ distro }}_{{ version_major }}_{{ arch }}.yml"
        - "{{ distro }}_{{ version_major }}_{{ arch }}.yml"
        # 4. Exact Match: OS Family + Full Version + Arch
        - "{{ mode }}/{{ family }}_{{ version_major }}.{{ version_minor }}_{{ arch }}.yml"
        - "{{ family }}_{{ version_major }}.{{ version_minor }}_{{ arch }}.yml"
        # 5. Exact Match: OS Family + Major Version + Arch
        - "{{ mode }}/{{ family }}_{{ version_major }}_{{ arch }}.yml"
        - "{{ family }}_{{ version_major }}_{{ arch }}.yml"
        # 6. Partial Match: Distro ID + Version Code
        - "{{ mode }}/{{ distro }}_{{ version_code }}.yml"
        - "{{ distro }}_{{ version_code }}.yml"
        # 7. Partial Match: Distro ID + Full Version
        - "{{ mode }}/{{ distro }}_{{ version_major }}.{{ version_minor }}.yml"
        - "{{ distro }}_{{ version_major }}.{{ version_minor }}.yml"
        # 8. Partial Match: Distro ID + Major Version
        - "{{ mode }}/{{ distro }}_{{ version_major }}.yml"
        - "{{ distro }}_{{ version_major }}.yml"
        # 9. Partial Match: OS Family + Full Version
        - "{{ mode }}/{{ family }}_{{ version_major }}.{{ version_minor }}.yml"
        - "{{ family }}_{{ version_major }}.{{ version_minor }}.yml"
        # 10. Partial Match: OS Family + Major Version
        - "{{ mode }}/{{ family }}_{{ version_major }}.yml"
        - "{{ family }}_{{ version_major }}.yml"
        # 11. Partial Match: Distro ID + Arch
        - "{{ mode }}/{{ distro }}_{{ arch }}.yml"
        - "{{ distro }}_{{ arch }}.yml"
        # 12. Partial Match: OS Family + Arch
        - "{{ mode }}/{{ family }}_{{ arch }}.yml"
        - "{{ family }}_{{ arch }}.yml"
        # 13. Generic Match: Distro ID
        - "{{ mode }}/{{ distro }}.yml"
        - "{{ distro }}.yml"
        # 14. Generic Match: OS Family
        - "{{ mode }}/{{ family }}.yml"
        - "{{ family }}.yml"
        # 15. Generic Match: Distribution Name (Fallback if ID differs)
        - "{{ mode }}/{{ distro_name }}.yml"
        - "{{ distro_name }}.yml"
        # 16. Generic Match: Architecture only
        - "{{ mode }}/{{ arch }}.yml"
        - "{{ arch }}.yml"
        # App Name Match
        - "{{ mode }}/{{ app_name }}.yml"
        - "{{ app_name }}.yml"
        # 17. Ultimate Fallback
        - "{{ mode }}/main.yml"
        - "{{ mode }}/default.yml"
        - "{{ mode }}.yml"
        - "main.yml"
        - "default.yml"
  when:
    - app_loader_custom_exists | default(false, true)
    - app_tasks_path is defined
  tags: ["always"]

# ---------------------------------------------------------------------
# 14. Audit Logging
# ---------------------------------------------------------------------
- ansible.builtin.debug:
    msg: |
      [APP_LOADER] {{ app_name }}
      Status: {{ 'Custom-Tasks' if (app_tasks_file | default('', true) | length > 0) else 'Generic-Logic' }}
      Delivery Mode: {{ app_delivery_mode }}

      Discovery Context:
      - App Source Path: {{ resolved_app_source_path }}
      - Parent Chain: {{ ansible_parent_role_paths | default([], true) | join(' -> ') }}
      - Defaults Root: {{ app_defaults_path | default('NONE', true) }}
      - Custom Exists: {{ app_loader_custom_exists | default(false, true) }}

      Path Context:
      - Variables Root: {{ app_vars_path }}
      - Tasks Root: {{ app_tasks_path }}
      - Resolved Task: {{ app_tasks_file | default('NONE', true) }}

      OS Context:
      - Family: {{ os_family | default('unknown', true) }}
      - Distribution: {{ os_distribution_id | default('unknown', true) }}
      - Major Version: {{ os_version_major | default('0', true) }}

# ---------------------------------------------------------------------
# 15. Execution
# ---------------------------------------------------------------------
- name: "Execute resolved tasks for {{ app_name }}"
  ansible.builtin.include_role:
    name: "{{ resolved_app_source_path }}"
    tasks_from: "{{ app_tasks_file | relpath(app_tasks_path) }}"
  when:
    - app_tasks_file is defined
    - app_tasks_file | default('', true) | length > 0

- name: "Execute generic deployment logic for {{ app_name }}"
  ansible.builtin.include_tasks: "dispatch.yml"
  when:
    - app_tasks_file is defined
    - app_tasks_file | default('', true) | length == 0
