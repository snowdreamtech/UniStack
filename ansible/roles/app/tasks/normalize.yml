---
# =====================================================================
# roles/app/tasks/normalize.yml
#
# Purpose:
#   Normalize unified application API fields.
#   This file ensures that all input variables for the application
#   deployment layer are converted into a consistent format used by
#   both the container and native deployment layers.
#
# Simple Usage:
#   - ansible.builtin.include_tasks:
#       file: normalize.yml
#     vars:
#       app_name: "nginx"
#
# Comprehensive Usage:
#   - ansible.builtin.include_tasks:
#       file: normalize.yml
#     vars:
#       app_name: "nginx"
#       app_delivery_mode: "container"
#       app_ports: "80:80"
#       app_volumes: ["/data:/data"]
#
# =====================================================================

# ---------------------------------------------------------------------
# Normalization Logic
# ---------------------------------------------------------------------

# ---------------------------------------------------------------------
# Set default description to empty string if not provided.
# ---------------------------------------------------------------------
- name: "Normalize all API fields for {{ app_name }}"
  ansible.builtin.set_fact:
    app_desc: "{{ app_desc | default('', true) }}"
    app_homepage: "{{ app_homepage | default('', true) }}"
    app_license: "{{ app_license | default('', true) }}"
    app_pull: "{{ app_pull | default(true, true) }}"
    app_state: "{{ app_state | default('present' if app_delivery_mode == 'native' else 'started', true) }}"

    app_image: "{{ app_image | default(app_name, true) if app_delivery_mode == 'container' else app_image | default('', true) }}"

    app_packages: >-
      {{
        ([app_packages | default(app_name, true)]
        if (app_packages | default(app_name, true)) is string
        else (app_packages | default(app_name, true) | list))
        if app_delivery_mode == 'native'
        else (app_packages | default([], true))
      }}

    app_compose_files: "{{ app_compose_files | default(['docker-compose.yml'], true) if app_delivery_mode == 'compose' else app_compose_files | default([], true) }}"
    app_compose_project_name: "{{ app_compose_project_name | default(app_name, true) if app_delivery_mode == 'compose' else app_compose_project_name | default('', true) }}"
    app_kube_manifest: "{{ app_kube_manifest | default('', true) }}"

    app_env: "{{ app_env | default({}, true) }}"
    app_env_file: "{{ app_env_file | default('', true) }}"

    app_install_cmd: "{{ app_install_cmd | default('', true) }}"
    app_install_creates: "{{ app_install_creates | default('', true) }}"
    app_install_env: "{{ app_install_env | default(app_env | default({}, true), true) }}"
    app_install_user: "{{ app_install_user | default('', true) }}"
    app_install_changed_when: "{{ app_install_changed_when | default(none, true) }}"
    app_install_failed_when: "{{ app_install_failed_when | default(none, true) }}"
    app_uninstall_cmd: "{{ app_uninstall_cmd | default('', true) }}"
    app_uninstall_changed_when: "{{ app_uninstall_changed_when | default(none, true) }}"
    app_uninstall_failed_when: "{{ app_uninstall_failed_when | default(none, true) }}"

    app_dmg_app_name: "{{ app_dmg_app_name | default('', true) }}"
    app_pkg_id: "{{ app_pkg_id | default('', true) }}"
    app_pkg_uninstall_script: "{{ app_pkg_uninstall_script | default('', true) }}"
    app_bundle_name: "{{ app_bundle_name | default('', true) }}"
    app_framework_name: "{{ app_framework_name | default('', true) }}"
    app_dylib_name: "{{ app_dylib_name | default('', true) }}"
    app_kext_name: "{{ app_kext_name | default('', true) }}"
    app_is_cask: "{{ app_is_cask | default(false, true) }}"

    app_ports: "{{ [app_ports] if (app_ports | default([], true)) is string else (app_ports | default([], true)) }}"
    app_volumes: "{{ [app_volumes] if (app_volumes | default([], true)) is string else (app_volumes | default([], true)) }}"
    app_networks: "{{ [app_networks] if (app_networks | default([], true)) is string else (app_networks | default([], true)) }}"

    app_labels: "{{ app_labels | default({}, true) }}"
    app_restart_policy: "{{ app_restart_policy | default('unless-stopped', true) }}"
    app_resources: "{{ app_resources | default({}, true) }}"
    app_healthcheck: "{{ app_healthcheck | default({}, true) }}"

    app_read_only: "{{ app_read_only | default(false, true) }}"
    app_tty: "{{ app_tty | default(false, true) }}"
    app_interactive: "{{ app_interactive | default(false, true) }}"
    app_privileged: "{{ app_privileged | default(false, true) }}"

    app_stop_timeout: "{{ (app_stop_timeout | default(10, true)) | int }}"
  tags: ["always"]
