---
# =====================================================================
# roles/app/tasks/validate.yml
#
# Purpose:
#   Validate the unified application API.
#   This file performs strict type and existence checks on all input
#   variables to ensure that the deployment process fails early with
#   clear error messages if the configuration is invalid.
#
# Simple Usage:
#   - ansible.builtin.include_tasks:
#       file: validate.yml
#     vars:
#       app_name: "nginx"
#       app_delivery_mode: "container"
#       app_state: "present"
#
# Comprehensive Usage:
#   - ansible.builtin.include_tasks:
#       file: validate.yml
#     vars:
#       app_name: "nginx"
#       app_delivery_mode: "container"
#       app_state: "started"
#       app_hostname: "web.example.com"
#
# =====================================================================

# ---------------------------------------------------------------------
# Core Validation: Ensure mandatory fields (name, state, delivery mode)
# are present and contain allowed values.
# ---------------------------------------------------------------------
- name: "Validate all API fields for {{ app_name }}"
  ansible.builtin.assert:
    that:
      - (validation_errors | from_json) | length == 0
    fail_msg: "API Validation Failed. Please check the following errors:\n{{ (validation_errors | from_json) | join('\n') }}"
    success_msg: "validate: all fields successfully validated"
  vars:
    validation_errors: >-
      {%- set errors = [] -%}

      {# Core Validation #}
      {%- if not (app_name is defined and app_name is string and (app_name | length) > 0) -%}
        {%- set _ = errors.append("- app_name must be a non-empty string. Received type: " ~ (app_name | type_debug if app_name is defined else 'undefined')) -%}
      {%- endif -%}
      {%- if app_state is defined and app_state not in ['present', 'started', 'stopped', 'restarted', 'absent', 'purged'] -%}
        {%- set _ = errors.append("- app_state must be one of: present, started, stopped, restarted, absent, purged. Received: " ~ app_state) -%}
      {%- endif -%}
      {%- if not (app_delivery_mode is defined and app_delivery_mode in ['container', 'native', 'compose', 'kube']) -%}
        {%- set _ = errors.append("- app_delivery_mode must be one of: container, native, compose, kube. Received: " ~ (app_delivery_mode | default('UNDEFINED', true))) -%}
      {%- endif -%}

      {# Description Validation #}
      {%- if app_desc is defined and not app_desc is string -%}
        {%- set _ = errors.append("- app_desc must be a string. Received type: " ~ (app_desc | type_debug)) -%}
      {%- endif -%}
      {%- if app_homepage is defined and not app_homepage is string -%}
        {%- set _ = errors.append("- app_homepage must be a string. Received type: " ~ (app_homepage | type_debug)) -%}
      {%- endif -%}
      {%- if app_license is defined and not app_license is string -%}
        {%- set _ = errors.append("- app_license must be a string. Received type: " ~ (app_license | type_debug)) -%}
      {%- endif -%}

      {# Container Validation #}
      {%- if app_delivery_mode == 'container' -%}
        {%- if app_image is defined and not app_image is string -%}
          {%- set _ = errors.append("- container mode: app_image must be a string") -%}
        {%- endif -%}
      {%- endif -%}

      {# Compose Validation #}
      {%- if app_delivery_mode == 'compose' -%}
        {%- if not (app_compose_project_src is defined and (app_compose_project_src | trim | length) > 0) -%}
          {%- set _ = errors.append("- compose mode requires app_compose_project_src (non-empty string)") -%}
        {%- endif -%}
        {%- if app_compose_files is defined and not app_compose_files is iterable -%}
          {%- set _ = errors.append("- compose mode: app_compose_files must be iterable (a list)") -%}
        {%- endif -%}
      {%- endif -%}

      {# Kube Validation #}
      {%- if app_delivery_mode == 'kube' -%}
        {%- if not (app_kube_manifest is defined and (app_kube_manifest | trim | length) > 0) -%}
          {%- set _ = errors.append("- kube mode requires app_kube_manifest (non-empty string)") -%}
        {%- endif -%}
      {%- endif -%}

      {# Native Validation #}
      {%- if app_delivery_mode == 'native' -%}
        {%- if app_packages is defined and not (app_packages is string or (app_packages is iterable and not app_packages is mapping)) -%}
          {%- set _ = errors.append("- native mode: app_packages must be a string or a list (not dict)") -%}
        {%- endif -%}
        {%- if app_install_cmd is defined and not app_install_cmd is string -%}
          {%- set _ = errors.append("- native mode: app_install_cmd must be a string") -%}
        {%- endif -%}
        {%- if app_install_creates is defined and not app_install_creates is string -%}
          {%- set _ = errors.append("- native mode: app_install_creates must be a string") -%}
        {%- endif -%}
        {%- if app_install_env is defined and not app_install_env is mapping -%}
          {%- set _ = errors.append("- native mode: app_install_env must be a dict") -%}
        {%- endif -%}
        {%- if app_install_user is defined and not app_install_user is string -%}
          {%- set _ = errors.append("- native mode: app_install_user must be a string") -%}
        {%- endif -%}
        {%- if app_install_changed_when is defined and not (app_install_changed_when is none or app_install_changed_when is string or app_install_changed_when is boolean) -%}
          {%- set _ = errors.append("- native mode: app_install_changed_when must be none/string/boolean") -%}
        {%- endif -%}
        {%- if app_install_failed_when is defined and not (app_install_failed_when is none or app_install_failed_when is string or app_install_failed_when is boolean) -%}
          {%- set _ = errors.append("- native mode: app_install_failed_when must be none/string/boolean") -%}
        {%- endif -%}
        {%- if app_uninstall_cmd is defined and not app_uninstall_cmd is string -%}
          {%- set _ = errors.append("- native mode: app_uninstall_cmd must be a string") -%}
        {%- endif -%}
        {%- if app_uninstall_changed_when is defined and not (app_uninstall_changed_when is none or app_uninstall_changed_when is string or app_uninstall_changed_when is boolean) -%}
          {%- set _ = errors.append("- native mode: app_uninstall_changed_when must be none/string/boolean") -%}
        {%- endif -%}
        {%- if app_uninstall_failed_when is defined and not (app_uninstall_failed_when is none or app_uninstall_failed_when is string or app_uninstall_failed_when is boolean) -%}
          {%- set _ = errors.append("- native mode: app_uninstall_failed_when must be none/string/boolean") -%}
        {%- endif -%}
        {%- if app_dmg_app_name is defined and not app_dmg_app_name is string -%}
          {%- set _ = errors.append("- native mode: app_dmg_app_name must be a string") -%}
        {%- endif -%}
        {%- if app_pkg_id is defined and not app_pkg_id is string -%}
          {%- set _ = errors.append("- native mode: app_pkg_id must be a string") -%}
        {%- endif -%}
        {%- if app_bundle_name is defined and not app_bundle_name is string -%}
          {%- set _ = errors.append("- native mode: app_bundle_name must be a string") -%}
        {%- endif -%}
        {%- if app_is_cask is defined and not app_is_cask is boolean -%}
          {%- set _ = errors.append("- native mode: app_is_cask must be a boolean") -%}
        {%- endif -%}
      {%- endif -%}

      {# Optional fields validation #}
      {%- if app_env is defined and not app_env is mapping -%}
        {%- set _ = errors.append("- app_env must be a dict") -%}
      {%- endif -%}
      {%- if app_env_file is defined and not app_env_file is string -%}
        {%- set _ = errors.append("- app_env_file must be a string") -%}
      {%- endif -%}
      {%- if app_ports is defined and not app_ports is iterable -%}
        {%- set _ = errors.append("- app_ports must be a list") -%}
      {%- endif -%}
      {%- if app_volumes is defined and not app_volumes is iterable -%}
        {%- set _ = errors.append("- app_volumes must be a list") -%}
      {%- endif -%}
      {%- if app_networks is defined and not app_networks is iterable -%}
        {%- set _ = errors.append("- app_networks must be a list") -%}
      {%- endif -%}
      {%- if app_labels is defined and not app_labels is mapping -%}
        {%- set _ = errors.append("- app_labels must be a dict") -%}
      {%- endif -%}
      {%- if app_resources is defined and not app_resources is mapping -%}
        {%- set _ = errors.append("- app_resources must be a dict") -%}
      {%- endif -%}
      {%- if app_hostname is defined and not app_hostname is string -%}
        {%- set _ = errors.append("- app_hostname must be a string") -%}
      {%- endif -%}
      {%- if app_read_only is defined and not app_read_only is boolean -%}
        {%- set _ = errors.append("- app_read_only must be a boolean") -%}
      {%- endif -%}
      {%- if app_tty is defined and not app_tty is boolean -%}
        {%- set _ = errors.append("- app_tty must be a boolean") -%}
      {%- endif -%}
      {%- if app_interactive is defined and not app_interactive is boolean -%}
        {%- set _ = errors.append("- app_interactive must be a boolean") -%}
      {%- endif -%}
      {%- if app_privileged is defined and not app_privileged is boolean -%}
        {%- set _ = errors.append("- app_privileged must be a boolean") -%}
      {%- endif -%}
      {%- if app_memory is defined and not app_memory is string -%}
        {%- set _ = errors.append("- app_memory must be a string") -%}
      {%- endif -%}
      {%- if app_cpus is defined and not app_cpus is number -%}
        {%- set _ = errors.append("- app_cpus must be a number") -%}
      {%- endif -%}
      {%- if app_cpu_shares is defined and not app_cpu_shares is number -%}
        {%- set _ = errors.append("- app_cpu_shares must be a number") -%}
      {%- endif -%}
      {%- if app_stop_timeout is defined and not (app_stop_timeout | int) is number -%}
        {%- set _ = errors.append("- app_stop_timeout must be a number") -%}
      {%- endif -%}
      {%- if app_shm_size is defined and not app_shm_size is string -%}
        {%- set _ = errors.append("- app_shm_size must be a string") -%}
      {%- endif -%}

      {{- errors | to_json -}}
  tags: ["always"]
