---
# =====================================================================
# roles/base/meta/main.yml
#
# Purpose:
#   Metadata and dependency configuration for the base role.
#   This role is fully self-contained with zero external dependencies.
#
# =====================================================================

galaxy_info:
  author: "Snowdreamtech"
  description: "Universal cross-distribution base role for infrastructure primitives."
  license: "MIT"
  min_ansible_version: "2.14"
  platforms:
    - name: "EL"
      versions: ["8", "9"]
    - name: "Debian"
      versions: ["11", "12"]
    - name: "Ubuntu"
      versions: ["20.04", "22.04", "24.04"]
    - name: "Alpine"
      versions: ["3.18", "3.19", "3.20", "3.21"]
    - name: "MacOSX"
      versions: ["all"]
    - name: "FreeBSD"
      versions: ["13", "14"]
  galaxy_tags:
    - "system"
    - "infrastructure"

dependencies: []
