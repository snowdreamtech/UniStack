---
# =====================================================================
# roles/base/vars/default.yml
#
# Purpose:
#   Fallback package list for OS families not explicitly supported.
#   Uses the most common package names that work across distributions.
# =====================================================================

base_packages:
  - sudo
  - procps
  - vim
  - zip
  - unzip
  - bzip2
  - xz
  - file
  - gzip
  - jq
  - tzdata
  - openssl
  - gnupg
  - wget
  - curl
  - git
  - lsof
  - ca-certificates

base_dev_packages: []
