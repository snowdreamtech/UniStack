---
# =====================================================================
# roles/base/vars/suse.yml
#
# Purpose:
#   openSUSE/SLE-specific package list for the base role.
#   Handles openSUSE-specific package naming and availability.
#
# Notes:
#   - openSUSE uses 'timezone' instead of 'tzdata'
#   - openSUSE Leap 15.6 has limited package availability
#   - Reduced to essential packages only to avoid missing deps
# =====================================================================

base_packages:
  # -------------------------------------------------------------------
  # OS Core & Administrative (Essential only)
  # -------------------------------------------------------------------
  - sudo
  - procps
  - timezone # ← openSUSE uses 'timezone' NOT 'tzdata'
  - ca-certificates

  # -------------------------------------------------------------------
  # Core Utilities & Archivers
  # -------------------------------------------------------------------
  - vim
  - zip
  - unzip
  - bzip2
  - xz
  - file
  - gzip
  - patch

  # -------------------------------------------------------------------
  # Productivity CLI
  # -------------------------------------------------------------------
  - fzf
  - tmux
  - bash-completion
  # - shellcheck # Not available in default openSUSE Leap 15.6 repositories

  # -------------------------------------------------------------------
  # Data Processing (JSON/YAML)
  # -------------------------------------------------------------------
  - jq

  # -------------------------------------------------------------------
  # Git & Development Workflow
  # -------------------------------------------------------------------
  - git

  # -------------------------------------------------------------------
  # System Monitoring
  # -------------------------------------------------------------------
  - htop

  # -------------------------------------------------------------------
  # Security & Identity
  # -------------------------------------------------------------------
  - openssl
  - gpg2

  # -------------------------------------------------------------------
  # Network & Data Transfer
  # -------------------------------------------------------------------
  - wget
  - curl
  - rsync

base_dev_packages: []
