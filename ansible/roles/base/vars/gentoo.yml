---
# =====================================================================
# roles/base/vars/gentoo.yml
#
# Purpose:
#   Gentoo-specific package list for the base role.
#   Gentoo uses portage package manager with fully-qualified package names
#   in the format category/package (e.g., app-arch/bzip2).
#
# Notes:
#   - All packages must use fully-qualified names (category/package)
#   - Some packages may have ambiguous short names or may not exist
#   - This list includes only widely available packages in stage3 images
# =====================================================================

base_packages:
  # -------------------------------------------------------------------
  # OS Core & Administrative (Essential only)
  # -------------------------------------------------------------------
  - app-admin/sudo
  - sys-process/procps
  - sys-libs/timezone-data
  - app-misc/ca-certificates

  # -------------------------------------------------------------------
  # Core Utilities & Archivers
  # -------------------------------------------------------------------
  - app-editors/vim
  - app-arch/zip
  - app-arch/unzip
  - app-arch/bzip2
  - app-arch/xz-utils
  - sys-apps/file

  # -------------------------------------------------------------------
  # Git & Development Workflow
  # -------------------------------------------------------------------
  - dev-vcs/git

  # -------------------------------------------------------------------
  # System Monitoring
  # -------------------------------------------------------------------
  - sys-process/htop

  # -------------------------------------------------------------------
  # Security & Identity
  # -------------------------------------------------------------------
  - dev-libs/openssl
  - app-crypt/gnupg

  # -------------------------------------------------------------------
  # Network & Data Transfer
  # -------------------------------------------------------------------
  - net-misc/wget
  - net-misc/curl
  - net-misc/rsync

base_dev_packages: []
