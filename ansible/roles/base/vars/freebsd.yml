---
# =====================================================================
# roles/base/vars/freebsd.yml
#
# Purpose:
#   FreeBSD-specific package list for the base role.
#   Uses pkg package names for feature parity with Linux distributions.
# =====================================================================

base_packages:
  # -------------------------------------------------------------------
  # OS Core & Administrative
  # -------------------------------------------------------------------
  - sudo
  - procps
  - psmisc
  - ca_root_nss
  - inotify-tools

  # -------------------------------------------------------------------
  # Core Utilities & Archivers
  # -------------------------------------------------------------------
  - vim
  - zip
  - unzip
  - bzip2
  - p7zip
  - xz
  - file
  - gzip
  - zstd
  - patch
  - gmake
  - fd-find
  - ripgrep
  - bat
  - tree
  - parallel
  - moreutils
  - pv

  # -------------------------------------------------------------------
  # Productivity CLI
  # -------------------------------------------------------------------
  - fzf
  - tmux
  - bash-completion
  - hs-ShellCheck

  # -------------------------------------------------------------------
  # Data Processing (JSON/YAML)
  # -------------------------------------------------------------------
  - jq
  - yq

  # -------------------------------------------------------------------
  # Git & Development Workflow
  # -------------------------------------------------------------------
  - git
  - git-lfs
  - tig

  # -------------------------------------------------------------------
  # System Monitoring & Resource Usage
  # -------------------------------------------------------------------
  - htop
  - ncdu
  - sysutils/sysstat

  # -------------------------------------------------------------------
  # Security & Identity
  # -------------------------------------------------------------------
  - openssl
  - gnupg
  - pinentry-tty
  - pinentry-curses
  - age

  # -------------------------------------------------------------------
  # Network & Data Transfer
  # -------------------------------------------------------------------
  - wget
  - curl
  - aria2
  - rsync
  - nmap
  - mtr
  - iperf3
  - socat
  - bind-tools
  - lsof
  - ipcalc

base_dev_packages: []
