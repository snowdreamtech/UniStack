---
# =====================================================================
# roles/base/vars/mageia.yml
#
# Purpose:
#   Mageia-specific package list for the base role.
#   Mageia is a community-driven Linux distribution based on the
#   former Mandriva Linux. It uses urpmi package manager.
# =====================================================================

# ---------------------------------------------------------------------
# Note: Ansible's urpmi module crashes when passing a list to the
# package module (TypeError: can only concatenate list not str to list).
# We define the packages as a private list and expose a comma-separated
# string to bypass this bug natively without polluting the main tasks.
# ---------------------------------------------------------------------

_mageia_base_packages:
  # -------------------------------------------------------------------
  # OS Core & Administrative
  # -------------------------------------------------------------------
  - sudo
  - procps
  - psmisc
  - tzdata
  - libcap
  - ca-certificates
  - inotify-tools
  - strace
  - man-db
  - man-pages
  - tcpdump

  # -------------------------------------------------------------------
  # Core Utilities & Archivers
  # -------------------------------------------------------------------
  - vim
  - zip
  - unzip
  - bzip2
  - p7zip
  - xz
  - file
  - gzip
  - zstd
  - patch
  - make
  - ripgrep
  - bat
  - tree
  - parallel

  # -------------------------------------------------------------------
  # Productivity CLI
  # -------------------------------------------------------------------
  - fzf
  - tmux
  - bash-completion
  - shellcheck

  # -------------------------------------------------------------------
  # Data Processing (JSON/YAML)
  # -------------------------------------------------------------------
  - jq
  - yq

  # -------------------------------------------------------------------
  # Git & Development Workflow
  # -------------------------------------------------------------------
  - git
  - git-lfs
  - tig

  # -------------------------------------------------------------------
  # System Monitoring & Resource Usage
  # -------------------------------------------------------------------
  - htop
  - ncdu
  - sysstat

  # -------------------------------------------------------------------
  # Security & Identity
  # -------------------------------------------------------------------
  - openssl
  - gnupg2
  - pinentry-tty
  - pinentry-curses

  # -------------------------------------------------------------------
  # Network & Data Transfer
  # -------------------------------------------------------------------
  - wget
  - curl
  - aria2
  - rsync
  - nmap
  - mtr
  - socat
  - bind-utils
  - iputils
  - net-tools
  - lsof
  - ipcalc

_mageia_base_dev_packages: []

base_packages: "{{ _mageia_base_packages | join(',') }}"
base_dev_packages: "{{ _mageia_base_dev_packages | join(',') if _mageia_base_dev_packages | length > 0 else '' }}"
