---
# =====================================================================
# roles/base/vars/openwrt.yml
#
# Purpose:
#   OpenWrt-specific package list for the base role.
#   OpenWrt uses opkg package manager with HIGHLY limited package set.
#   This is an embedded system image - most standard Linux packages unavailable.
#   Focuses on absolute essentials only.
#
# Notes:
#   - OpenWrt is an embedded Linux distribution with minimal packages
#   - Most compression utilities, archive tools, and dev tools unavailable
#   - Only includes packages guaranteed to exist in base OpenWrt image
#   - Many packages like zip, vim-full, xz-utils, make, etc not available
# =====================================================================

base_packages:
  # -------------------------------------------------------------------
  # Core Utilities (Only what's in base OpenWrt)
  # -------------------------------------------------------------------
  - grep
  - sed
  - coreutils
  - ca-bundle
  - git
  - curl
  - openssh-client

base_dev_packages: []
