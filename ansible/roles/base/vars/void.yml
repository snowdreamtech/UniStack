---
# =====================================================================
# roles/base/vars/void.yml
#
# Purpose:
#   Void Linux-specific package list for the base role.
#   Void uses xbps package manager with limited package availability.
#   This list is significantly reduced from other distros.
#
# Notes:
#   - Void is minimal; many packages are not available
#   - Focus on truly essential utilities only
# =====================================================================

base_packages:
  # -------------------------------------------------------------------
  # OS Core & Administrative (Essential only)
  # -------------------------------------------------------------------
  - sudo
  - procps-ng # Void uses procps-ng instead of procps
  - tzdata
  - ca-certificates

  # -------------------------------------------------------------------
  # Core Utilities & Archivers (Essential only)
  # -------------------------------------------------------------------
  - vim
  - unzip
  - xz
  - file
  - patch

  # -------------------------------------------------------------------
  # Productivity CLI
  # -------------------------------------------------------------------
  - fzf
  - tmux

  # -------------------------------------------------------------------
  # Data Processing (JSON/YAML)
  # -------------------------------------------------------------------
  - jq

  # -------------------------------------------------------------------
  # Git & Development Workflow
  # -------------------------------------------------------------------
  - git

  # -------------------------------------------------------------------
  # System Monitoring
  # -------------------------------------------------------------------
  - htop

  # -------------------------------------------------------------------
  # Security & Identity
  # -------------------------------------------------------------------
  - openssl
  - gnupg2

  # -------------------------------------------------------------------
  # Network & Data Transfer
  # -------------------------------------------------------------------
  - wget
  - curl
  - rsync

base_dev_packages: []
