---
# =====================================================================
# roles/base/tasks/default.yml
#
# Purpose:
#   Default set of baseline configuration tasks.
#   Includes installation of core packages, VIM customization,
#   and global Git settings applied system-wide.
#   Used for Linux and BSD systems (non-macOS).
#
# Decoupling Notes:
#   - Replaces Uniloader's `app` role with ansible.builtin.package
#   - Replaces Uniloader's `native/copy_loader` with ansible.builtin.copy
#   - Inlines `native/curl_conflict_loader` for RedHat
#
# =====================================================================

# ---------------------------------------------------------------------
# Preparation: Ensure Ansible package module dependencies
# For VMware Photon, install python3-dnf into the system AND venv
# before using ansible.builtin.package with dnf backend.
# The venv is created with --system-site-packages, but we need to
# ensure dnf module is accessible to Ansible's Python interpreter.
# ---------------------------------------------------------------------
- name: "Install python3-dnf (Photon) for Ansible package module"
  ansible.builtin.raw: |
    set -eu
    # Install to system first
    tdnf install -y python3-dnf || true
    # Also try to install in current Python environment
    {{ ansible_python_interpreter | default('/usr/bin/python3') }} -m pip install dnf || true
  changed_when: false
  failed_when: false
  when:
    - os_distribution_id | default('', true) == 'photon'
  become: "{{ become_enabled }}"

# Preparation: resolve known curl conflicts during package manager
# initialization (RedHat only).
# Inlined from Uniloader's native/curl_conflict_loader.
# ---------------------------------------------------------------------
- name: "Resolve curl/libcurl conflicts (RedHat) {{ '(' ~ os_family ~ ')' if os_family is defined else '' }}"
  ansible.builtin.shell: |
    set -eu
    if rpm -q libcurl-minimal > /dev/null 2>&1 && rpm -q curl-minimal > /dev/null 2>&1; then
      dnf swap -y curl-minimal curl 2>/dev/null || true
      dnf swap -y libcurl-minimal libcurl 2>/dev/null || true
    fi
  args:
    executable: /bin/bash
  become: "{{ become_enabled }}"
  changed_when: false
  failed_when: false
  when: os_family | default('', true) == 'redhat'

# ---------------------------------------------------------------------
# Execution: Install the baseline utilities defined in the base role
# vars (e.g., zip, jq, vim, procps).
# Replaces Uniloader's `app` role with direct ansible.builtin.package.
# ---------------------------------------------------------------------
- name: "Install base system packages {{ '(' ~ os_family ~ ')' if os_family is defined else '' }}"
  ansible.builtin.package:
    name: "{{ base_packages }}"
    state: present
  become: "{{ become_enabled }}"
  when: base_packages | default([]) | length > 0

- name: "Install base development packages {{ '(' ~ os_family ~ ')' if os_family is defined else '' }}"
  ansible.builtin.package:
    name: "{{ base_dev_packages }}"
    state: present
  become: "{{ become_enabled }}"
  when: base_dev_packages | default([]) | length > 0

# ---------------------------------------------------------------------
# Configuration: Apply global VIM preferences.
# Replaces Uniloader's native/copy_loader with ansible.builtin.copy.
# ---------------------------------------------------------------------
- name: "Set VIM configuration path fact {{ '(' ~ os_family ~ ')' if os_family is defined else '' }}"
  ansible.builtin.set_fact:
    vim_config_root: "/etc/vim"
  tags: ["always"]

- name: "Ensure vim config directory exists {{ '(' ~ os_family ~ ')' if os_family is defined else '' }}"
  ansible.builtin.file:
    path: "{{ vim_config_root }}"
    state: "directory"
    mode: "0755"
  become: "{{ become_enabled }}"
  when: not (is_container | default(false, true))

- name: "Deploy vimrc.local {{ '(' ~ os_family ~ ')' if os_family is defined else '' }}"
  ansible.builtin.copy:
    src: "vimrc.local"
    dest: "{{ vim_config_root }}/vimrc.local"
    owner: "{{ unistack_root_user | default('root', true) }}"
    group: "{{ unistack_root_group | default('root', true) }}"
    mode: "0644"
  become: "{{ become_enabled }}"
  when: not (is_container | default(false, true))

- name: "Integrate vimrc.local (RedHat) {{ '(' ~ os_family ~ ')' if os_family is defined else '' }}"
  ansible.builtin.blockinfile:
    path: "/etc/vimrc"
    marker: '" {mark} ANSIBLE vimrc.local loader'
    block: |
      if filereadable("/etc/vim/vimrc.local")
        source /etc/vim/vimrc.local
      endif
    insertafter: "EOF"
  become: "{{ become_enabled }}"
  when:
    - os_family | default('', true) == 'redhat'

# ---------------------------------------------------------------------
# Lifecycle: Execute the git_config shell script to apply global
# identity and performance settings.
# ---------------------------------------------------------------------
- name: "Configure system-wide Git settings {{ '(' ~ os_family ~ ')' if os_family is defined else '' }}"
  ansible.builtin.script: "git_config.sh"
  environment:
    GIT_USER_NAME: "{{ git_user_name | default('', true) }}"
    GIT_USER_EMAIL: "{{ git_user_email | default('', true) }}"
    GIT_EDITOR: "{{ git_editor | default('vim', true) }}"
    GIT_SIGNING_KEY: "{{ git_signing_key | default('', true) }}"
    GIT_SIGNING: "{{ git_signing | default(false, true) }}"
  become: "{{ become_enabled }}"
  changed_when: false
