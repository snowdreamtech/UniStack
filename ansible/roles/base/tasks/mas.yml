---
# =====================================================================
# roles/base/tasks/mas.yml
#
# Purpose:
#   Install mas (Mac App Store CLI) on macOS with version compatibility.
#   Ported from Uniloader with zero native role dependencies.
#
#   Decoupling Notes:
#   - Replaces native/package_loader with direct
#     community.general.homebrew / community.general.macports calls
#
#   macOS 13+ (Ventura or newer):
#     1. Homebrew Core -> brew install mas
#     2. MacPorts -> port install mas
#     3. GitHub Releases -> v5.x
#
#   macOS 11-12 (Big Sur to Monterey):
#     1. Homebrew Tap -> brew install mas-cli/tap/mas
#     2. GitHub Releases -> v4.1.2
#
# =====================================================================

# ---------------------------------------------------------------------
# Pre-flight Check: Detect if mas is already installed
# ---------------------------------------------------------------------
- name: "mas: Check if already installed"
  ansible.builtin.shell: "command -v mas"
  register: _mas_check
  failed_when: false
  changed_when: false
  tags: ["always"]

- name: "mas: Set installation status fact"
  ansible.builtin.set_fact:
    _mas_already_installed: "{{ _mas_check.rc == 0 }}"
  tags: ["always"]

- name: "mas: Skip installation (already present)"
  ansible.builtin.debug:
    msg: "mas is already installed at {{ _mas_check.stdout }}"
  when: _mas_already_installed | bool

# ---------------------------------------------------------------------
# Version Detection
# ---------------------------------------------------------------------
- name: "mas: Detect macOS version"
  ansible.builtin.set_fact:
    _is_macos_13_plus: "{{ os_version_major | int >= 13 }}"
    _is_macos_11_plus: "{{ os_version_major | int >= 11 }}"
    _mas_not_supported: "{{ os_version_major | int < 11 }}"
  when: not _mas_already_installed | bool
  tags: ["always"]

- name: "mas: Error for unsupported macOS (10.10 or older)"
  ansible.builtin.fail:
    msg: >-
      ERROR: macOS {{ os_version_major }}.{{ os_version_minor | default('0') }} is not supported by mas.
      mas requires macOS 11 (Big Sur) or newer.
  when:
    - not _mas_already_installed | bool
    - _mas_not_supported | default(false) | bool

# ---------------------------------------------------------------------
# Strategy 1: Homebrew Core (macOS 13+ only)
# Replaces native/package_loader with community.general.homebrew.
# ---------------------------------------------------------------------
- name: "mas: Install via Homebrew Core"
  community.general.homebrew:
    name: "mas"
    state: present
  become: false
  when:
    - not _mas_already_installed | bool
    - _is_macos_13_plus | default(false) | bool
    - is_homebrew_installed | default(false) | bool
  register: _mas_brew_install
  failed_when: false

- name: "mas: Update status after Homebrew install"
  ansible.builtin.set_fact:
    _mas_already_installed: "{{ _mas_brew_install is defined and _mas_brew_install is succeeded }}"
  when:
    - _mas_brew_install is defined
    - not _mas_brew_install is skipped
  tags: ["always"]

# ---------------------------------------------------------------------
# Strategy 2: Homebrew Tap (macOS 11-12 only)
# Replaces native/package_loader with community.general.homebrew_tap
# + community.general.homebrew.
# ---------------------------------------------------------------------
- name: "mas: Add Homebrew Tap for legacy macOS"
  community.general.homebrew_tap:
    name: "mas-cli/tap"
    state: present
  when:
    - not _mas_already_installed | bool
    - not _is_macos_13_plus | default(false) | bool
    - is_homebrew_installed | default(false) | bool
  become: false

- name: "mas: Install via Homebrew Tap"
  community.general.homebrew:
    name: "mas-cli/tap/mas"
    state: present
  when:
    - not _mas_already_installed | bool
    - not _is_macos_13_plus | default(false) | bool
    - is_homebrew_installed | default(false) | bool
  become: false
  register: _mas_tap_install
  failed_when: false

- name: "mas: Update status after Homebrew Tap install"
  ansible.builtin.set_fact:
    _mas_already_installed: "{{ _mas_tap_install is defined and _mas_tap_install is succeeded }}"
  when:
    - _mas_tap_install is defined
    - not _mas_tap_install is skipped
  tags: ["always"]

# ---------------------------------------------------------------------
# Strategy 3: MacPorts Fallback (macOS 13+ only)
# Replaces native/package_loader with community.general.macports.
# ---------------------------------------------------------------------
- name: "mas: Install via MacPorts"
  community.general.macports:
    name: "mas"
    state: present
  when:
    - not _mas_already_installed | bool
    - _is_macos_13_plus | default(false) | bool
    - not is_homebrew_installed | default(false) | bool
    - is_macports_installed | default(false) | bool
  become: "{{ become_enabled }}"
  register: _mas_macports_install
  failed_when: false

- name: "mas: Update status after MacPorts install"
  ansible.builtin.set_fact:
    _mas_already_installed: "{{ _mas_macports_install is defined and _mas_macports_install is succeeded }}"
  when:
    - _mas_macports_install is defined
    - not _mas_macports_install is skipped
  tags: ["always"]

# ---------------------------------------------------------------------
# Strategy 4: GitHub Releases Fallback (when no package manager)
# ---------------------------------------------------------------------
- name: "mas: Detect binary installation path"
  ansible.builtin.set_fact:
    _mas_bin_path: "{{ '/opt/homebrew/bin' if ansible_facts.architecture | default('') == 'arm64' else '/usr/local/bin' }}"
  when:
    - not _mas_already_installed | bool
    - not is_homebrew_installed | default(false) | bool
    - not is_macports_installed | default(false) | bool
  tags: ["always"]

- name: "mas: Determine GitHub release URL"
  ansible.builtin.set_fact:
    _mas_github_url: >-
      {%- set no_pkg_mgr = not (is_homebrew_installed | default(false) | bool) and not (is_macports_installed | default(false) | bool) -%}
      {%- set macos_12_no_brew = not (_is_macos_13_plus | bool) and not (is_homebrew_installed | default(false) | bool) -%}
      {%- if _is_macos_13_plus | bool and no_pkg_mgr -%}
        {{ github_proxy | default('', true) }}https://github.com/mas-cli/mas/releases/latest/download/mas.zip
      {%- elif macos_12_no_brew -%}
        {%- if ansible_facts.architecture | default('') in ['arm64', 'aarch64'] -%}
          {{ github_proxy | default('', true) }}https://github.com/mas-cli/mas/releases/download/v4.1.2/mas-4.1.2-arm64.pkg
        {%- else -%}
          {{ github_proxy | default('', true) }}https://github.com/mas-cli/mas/releases/download/v4.1.2/mas-4.1.2-x86_64.pkg
        {%- endif -%}
      {%- else -%}

      {%- endif -%}
  when:
    - not _mas_already_installed | bool
    - not is_homebrew_installed | default(false) | bool
    - not is_macports_installed | default(false) | bool
  tags: ["always"]

- name: "mas: Download from GitHub Releases"
  ansible.builtin.get_url:
    url: "{{ _mas_github_url }}"
    dest: "/tmp/mas.{{ 'pkg' if _mas_github_url.endswith('.pkg') else 'zip' }}"
    mode: "0644"
    timeout: 60
  retries: 5
  delay: 10
  register: _mas_download
  until: _mas_download is succeeded
  when:
    - not _mas_already_installed | bool
    - _mas_github_url is defined
    - _mas_github_url | length > 0
  become: false

- name: "mas: Ensure binary directory exists"
  ansible.builtin.file:
    path: "{{ _mas_bin_path }}"
    state: directory
    mode: "0755"
  when:
    - not _mas_already_installed | bool
    - _mas_github_url is defined
    - _mas_github_url | length > 0
  become: "{{ become_enabled }}"

- name: "mas: Extract GitHub release (ZIP)"
  ansible.builtin.unarchive:
    src: "/tmp/mas.zip"
    dest: "{{ _mas_bin_path }}"
    remote_src: true
    mode: "0755"
  when:
    - not _mas_already_installed | bool
    - _mas_github_url is defined
    - _mas_github_url | length > 0
    - _mas_github_url.endswith('.zip')
  become: "{{ become_enabled }}"

- name: "mas: Install GitHub release (PKG)"
  ansible.builtin.shell: "installer -pkg /tmp/mas.pkg -target /"
  when:
    - not _mas_already_installed | bool
    - _mas_github_url is defined
    - _mas_github_url | length > 0
    - _mas_github_url.endswith('.pkg')
  become: "{{ become_enabled }}"

- name: "mas: Cleanup downloaded archive"
  ansible.builtin.file:
    path: "/tmp/mas.{{ 'pkg' if _mas_github_url.endswith('.pkg') else 'zip' }}"
    state: absent
  when:
    - _mas_github_url is defined
    - _mas_github_url | length > 0
  become: false
