---
# =====================================================================
# roles/base/tasks/darwin.yml
#
# Purpose:
#   macOS-specific baseline configuration tasks.
#   Installs Homebrew and MacPorts (package managers), mas (Mac App Store CLI),
#   base system packages, VIM configuration, and global Git settings.
#
# Decoupling Notes:
#   - Replaces Uniloader's `app` role with community.general.homebrew /
#     community.general.macports module for package installation
#   - Replaces Uniloader's `native/copy_loader` with ansible.builtin.copy
#
# =====================================================================

# ---------------------------------------------------------------------
# Pre-flight Check: Avoid redundant GPG installation if GPGTools
# is present (e.g. system-wide GPG Suite).
# ---------------------------------------------------------------------
- name: "Check if GPG is already installed system-wide"
  ansible.builtin.command: "which gpg"
  register: gpg_installed_check
  failed_when: false
  changed_when: false
  check_mode: false
  tags: ["always"]

- name: "Exclude gnupg from base packages if already present"
  ansible.builtin.set_fact:
    base_packages: "{{ base_packages | reject('search', 'gnupg') | list }}"
  when: gpg_installed_check.rc == 0
  tags: ["always"]

# ---------------------------------------------------------------------
# macOS: Install Homebrew (Package Manager)
# ---------------------------------------------------------------------
- ansible.builtin.include_tasks: "homebrew.yml"

# ---------------------------------------------------------------------
# macOS: Install MacPorts (Alternative Package Manager)
# ---------------------------------------------------------------------
- ansible.builtin.include_tasks: "macports.yml"

# ---------------------------------------------------------------------
# macOS: Install mas (Mac App Store CLI) with version compatibility
# ---------------------------------------------------------------------
- ansible.builtin.include_tasks: "mas.yml"

# ---------------------------------------------------------------------
# Execution: Install the baseline utilities.
# Replaces Uniloader's `app` role with direct package manager modules.
# Tries Homebrew first, then MacPorts fallback.
# ---------------------------------------------------------------------
- name: "Install base packages via Homebrew (macOS)"
  community.general.homebrew:
    name: "{{ base_packages }}"
    state: present
  become: false
  when:
    - is_homebrew_installed | default(false) | bool
    - base_packages | default([]) | length > 0

- name: "Install base packages via MacPorts (macOS)"
  community.general.macports:
    name: "{{ base_packages }}"
    state: present
  become: "{{ become_enabled }}"
  when:
    - not is_homebrew_installed | default(false) | bool
    - is_macports_installed | default(false) | bool
    - base_packages | default([]) | length > 0

- name: "Install base dev packages via Homebrew (macOS)"
  community.general.homebrew:
    name: "{{ base_dev_packages }}"
    state: present
  become: false
  when:
    - is_homebrew_installed | default(false) | bool
    - base_dev_packages | default([]) | length > 0

- name: "Install base dev packages via MacPorts (macOS)"
  community.general.macports:
    name: "{{ base_dev_packages }}"
    state: present
  become: "{{ become_enabled }}"
  when:
    - not is_homebrew_installed | default(false) | bool
    - is_macports_installed | default(false) | bool
    - base_dev_packages | default([]) | length > 0

# ---------------------------------------------------------------------
# Configuration: Apply global VIM preferences.
# Replaces Uniloader's native/copy_loader with ansible.builtin.copy.
# ---------------------------------------------------------------------
- name: "Set VIM configuration path fact (macOS)"
  ansible.builtin.set_fact:
    vim_config_root: >-
      {%- if os_family != 'darwin' -%}
        /etc/vim
      {%- elif is_homebrew_installed | default(false) | bool -%}
        {{ '/opt/homebrew/etc/vim' if ansible_facts.architecture | default('') == 'arm64' else '/usr/local/etc/vim' }}
      {%- elif is_macports_installed | default(false) | bool -%}
        /opt/local/etc/vim
      {%- else -%}
        /usr/local/etc/vim
      {%- endif -%}
  tags: ["always"]

- name: "Ensure vim config directory exists (macOS)"
  ansible.builtin.file:
    path: "{{ vim_config_root }}"
    state: "directory"
    mode: "0755"
  become: "{{ become_enabled }}"
  when: not (is_container | default(false, true))

- name: "Deploy vimrc.local (macOS)"
  ansible.builtin.copy:
    src: "vimrc.local"
    dest: "{{ vim_config_root }}/vimrc.local"
    owner: "{{ ansible_user_name | default(ansible_user_id, true) }}"
    group: "wheel"
    mode: "0644"
  become: "{{ become_enabled }}"
  when: not (is_container | default(false, true))

# ---------------------------------------------------------------------
# Lifecycle: Execute the git_config shell script to apply global
# identity and performance settings.
# ---------------------------------------------------------------------
- name: "Configure system-wide Git settings (macOS)"
  ansible.builtin.script: "git_config.sh"
  environment:
    GIT_USER_NAME: "{{ git_user_name | default('', true) }}"
    GIT_USER_EMAIL: "{{ git_user_email | default('', true) }}"
    GIT_EDITOR: "{{ git_editor | default('vim', true) }}"
    GIT_SIGNING_KEY: "{{ git_signing_key | default('', true) }}"
    GIT_SIGNING: "{{ git_signing | default(false, true) }}"
  become: "{{ become_enabled }}"
  changed_when: false
