---
# =====================================================================
# roles/base/tasks/main.yml
#
# Purpose:
#   Entry point for general system base configuration.
#   Loads OS-specific variables and delegates to the appropriate
#   OS-specific task file for foundational settings.
#
# Prerequisites:
#   The context role must be loaded first to provide:
#   - os_family, os_distribution, os_distribution_id
#   - become_enabled, is_container
#
# Simple Usage:
#   - role: base
#
# Comprehensive Usage:
#   - role: base
#     vars:
#       become_enabled: true
#
# =====================================================================

# ---------------------------------------------------------------------
# Stage 0: Load OS-specific package mappings
# Uses the same include_vars pattern as the init role.
# Replaces Uniloader's native/os_loader with direct include_vars.
# Must look in vars/ subdirectory to avoid loading tasks files
# (e.g., tasks/nixos.yml should not be loaded here)
# ---------------------------------------------------------------------
- name: "Load OS-specific variable mappings"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - "vars/{{ os_family | default('unknown', true) }}.yml"
    - "vars/{{ os_distribution_id | default('unknown', true) }}.yml"
    - "vars/{{ os_distribution | default('unknown', true) }}.yml"
    - "vars/default.yml"
  tags: ["always"]

# ---------------------------------------------------------------------
# Stage 1: Delegate to OS-specific task file
# Replaces Uniloader's native/os_loader task dispatch.
# ---------------------------------------------------------------------
- name: "Dispatch to OS-specific base tasks"
  ansible.builtin.include_tasks: "{{ _base_task_file }}"
  vars:
    _base_task_file: >-
      {%- if os_family | default('', true) == 'darwin' -%}
        darwin.yml
      {%- elif os_family | default('', true) == 'debian' -%}
        debian.yml
      {%- else -%}
        default.yml
      {%- endif -%}
  tags: ["always"]
