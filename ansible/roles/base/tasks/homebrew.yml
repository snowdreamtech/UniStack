---
# =====================================================================
# roles/base/tasks/homebrew.yml
#
# Purpose:
#   Install Homebrew (brew) on macOS with version compatibility.
#   Ported from Uniloader with zero native role dependencies.
#
#   macOS 14+ (Sonoma or newer): Officially supported
#   macOS 10.15-13 (Catalina to Ventura): May work (warning)
#   macOS 10.14- (Mojave or older): Not supported, skip
#
# =====================================================================

# ---------------------------------------------------------------------
# Pre-flight Check: Detect if Homebrew is already installed
# ---------------------------------------------------------------------
- name: "Homebrew: Check if already installed"
  ansible.builtin.shell: "command -v brew"
  register: _brew_check
  failed_when: false
  changed_when: false
  tags: ["always"]

- name: "Homebrew: Set installation status fact"
  ansible.builtin.set_fact:
    is_homebrew_installed: "{{ _brew_check.rc == 0 }}"
  tags: ["always"]

- name: "Homebrew: Skip installation (already present)"
  ansible.builtin.debug:
    msg: "Homebrew is already installed at {{ _brew_check.stdout }}"
  when: is_homebrew_installed | bool

# ---------------------------------------------------------------------
# MacPorts Conflict Detection
# ---------------------------------------------------------------------
- name: "Homebrew: Check if MacPorts is installed"
  ansible.builtin.stat:
    path: "/opt/local/bin/port"
  register: _macports_check
  when: not is_homebrew_installed | bool
  tags: ["always"]

- name: "Homebrew: Set MacPorts status fact"
  ansible.builtin.set_fact:
    is_macports_installed: "{{ _macports_check.stat.exists }}"
  when:
    - not is_homebrew_installed | bool
    - _macports_check is defined
    - _macports_check.stat is defined
  tags: ["always"]

- name: "Homebrew: Skip installation (MacPorts already present)"
  ansible.builtin.debug:
    msg: >-
      MacPorts is already installed at /opt/local/bin/port.
      Skipping Homebrew installation to avoid package manager conflicts.
  when:
    - not is_homebrew_installed | bool
    - is_macports_installed | default(false) | bool

# ---------------------------------------------------------------------
# Version Compatibility Detection
# ---------------------------------------------------------------------
- name: "Homebrew: Detect macOS version compatibility"
  ansible.builtin.set_fact:
    _brew_officially_supported: "{{ os_version_major | int >= 14 }}"
    _brew_may_work: "{{ os_version_major | int >= 10 and os_version_major | int <= 13 }}"
    _brew_not_supported: "{{ os_version_major | int < 10 }}"
  when:
    - not is_homebrew_installed | bool
    - not is_macports_installed | default(false) | bool
  tags: ["always"]

# ---------------------------------------------------------------------
# Installation Decision Logic
# ---------------------------------------------------------------------
- name: "Homebrew: Warning for legacy macOS (10.15-13)"
  ansible.builtin.debug:
    msg: >-
      WARNING: macOS {{ os_version_major }}.{{ os_version_minor | default('0') }} is not officially supported by Homebrew.
      Homebrew officially supports macOS 14 (Sonoma) or higher.
      Set homebrew_force_install: true to proceed anyway.
  when:
    - not is_homebrew_installed | bool
    - not is_macports_installed | default(false) | bool
    - _brew_may_work | default(false) | bool
    - not homebrew_force_install | default(false) | bool

- name: "Homebrew: Warning for very old macOS (10.14-)"
  ansible.builtin.debug:
    msg: >-
      WARNING: macOS {{ os_version_major }}.{{ os_version_minor | default('0') }} (Mojave or older) is not compatible with Homebrew.
      Skipping Homebrew installation. MacPorts will be used as fallback if available.
  when:
    - not is_homebrew_installed | bool
    - not is_macports_installed | default(false) | bool
    - _brew_not_supported | default(false) | bool

# ---------------------------------------------------------------------
# Installation: Official Homebrew Script
# ---------------------------------------------------------------------
- name: "Homebrew: Install via official script"
  ansible.builtin.shell: |
    set -eu
    /bin/bash -c "$(curl -fsSL --retry 5 --retry-delay 10 --connect-timeout 60 {{ github_proxy | default('', true) }}https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  environment:
    NONINTERACTIVE: "1"
  when:
    - not is_homebrew_installed | bool
    - not is_macports_installed | default(false) | bool
    - not _brew_not_supported | default(false) | bool
    - (_brew_officially_supported | default(false) | bool) or
      (_brew_may_work | default(false) | bool and homebrew_force_install | default(false) | bool)
  register: _brew_install_result
  become: false

# ---------------------------------------------------------------------
# Post-installation: Update PATH and verify
# ---------------------------------------------------------------------
- name: "Homebrew: Detect installation path"
  ansible.builtin.set_fact:
    _brew_prefix: "{{ '/opt/homebrew' if ansible_facts.architecture | default('') == 'arm64' else '/usr/local' }}"
  when: _brew_install_result is changed
  tags: ["always"]

- name: "Homebrew: Verify installation"
  ansible.builtin.shell: "{{ _brew_prefix }}/bin/brew --version"
  register: _brew_verify
  failed_when: false
  changed_when: false
  when: _brew_install_result is changed

- name: "Homebrew: Update installation status fact"
  ansible.builtin.set_fact:
    is_homebrew_installed: "{{ _brew_verify.rc == 0 }}"
  when: _brew_verify is defined and not _brew_verify.skipped | default(false)
  tags: ["always"]

# ---------------------------------------------------------------------
# Homebrew Cask: Verify availability
# ---------------------------------------------------------------------
- name: "Homebrew Cask: Verify availability"
  ansible.builtin.shell: "{{ _brew_prefix | default('/opt/homebrew' if ansible_facts.architecture | default('') == 'arm64' else '/usr/local') }}/bin/brew --version"
  register: _cask_check
  failed_when: false
  changed_when: false
  when: is_homebrew_installed | bool

# ---------------------------------------------------------------------
# Analytics: Disable Homebrew analytics (privacy)
# ---------------------------------------------------------------------
- name: "Homebrew: Disable analytics"
  ansible.builtin.shell: "{{ _brew_prefix | default('/opt/homebrew' if ansible_facts.architecture | default('') == 'arm64' else '/usr/local') }}/bin/brew analytics off"
  when: is_homebrew_installed | bool
  changed_when: false
  become: false
