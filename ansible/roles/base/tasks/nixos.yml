---
# =====================================================================
# roles/base/tasks/nixos.yml
#
# Purpose:
#   NixOS-specific baseline configuration tasks.
#   NixOS uses declarative configuration (configuration.nix), not
#   imperative package installation via Ansible. This role skips
#   package installation and only performs configuration tasks.
#
# Notes:
#   - Package management must be done via /etc/nixos/configuration.nix
#   - This file only handles VIM and Git configuration
#
# =====================================================================

# NixOS: Package installation via Ansible is not recommended
# Packages should be declared in /etc/nixos/configuration.nix instead
- name: "Skip package installation on NixOS (declarative config only)"
  ansible.builtin.debug:
    msg: >-
      NixOS uses declarative package management.
      Add required packages to /etc/nixos/configuration.nix
      and run 'nixos-rebuild switch' to apply changes.
  changed_when: false

# VIM configuration is skipped on NixOS
# Configuration should be done via /etc/nixos/configuration.nix
- name: "Skip VIM configuration on NixOS"
  ansible.builtin.debug:
    msg: "VIM configuration on NixOS should be done via configuration.nix"
  changed_when: false

# Git configuration can still be applied globally
- name: "Configure system-wide Git settings (NixOS)"
  ansible.builtin.script: "git_config.sh"
  environment:
    GIT_USER_NAME: "{{ git_user_name | default('', true) }}"
    GIT_USER_EMAIL: "{{ git_user_email | default('', true) }}"
    GIT_EDITOR: "{{ git_editor | default('vim', true) }}"
    GIT_SIGNING_KEY: "{{ git_signing_key | default('', true) }}"
    GIT_SIGNING: "{{ git_signing | default(false, true) }}"
  become: "{{ become_enabled }}"
  changed_when: false

