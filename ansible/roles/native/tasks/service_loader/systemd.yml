# =====================================================================
# roles/native/tasks/service_loader/systemd.yml
#
# Purpose:
#   Systemd-specific service management.
#   Includes robust pre-checks for unit existence and daemon-reload logic.
#
# Simple Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/systemd"
#     vars:
#       service_name: "nginx"
#
# Comprehensive Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "service_loader/systemd"
#     vars:
#       service_name: "nginx"
#       service_state: "started"
#       service_enabled: true
#
# =====================================================================

# ---------------------------------------------------------------------
# --- Validation ---
# ---------------------------------------------------------------------

# WHY: Ensure mandatory service identity is provided before proceeding.

---
- ansible.builtin.assert:
    that:
      - service_name is defined
      - service_name | length > 0
    fail_msg: "Systemd Service Error: service_name is mandatory."
  tags: ["always"]

# ---------------------------------------------------------------------
# --- Detection ---
# ---------------------------------------------------------------------

# WHY: Reset functional variables to prevent pollution.
- name: "Service (Systemd): Reset variables"
  ansible.builtin.set_fact:
    _systemctl_check: null
    _service_exists_check: null
    _service_unit_exists: null
  tags: ["always"]

# WHY: Verify that the system actually supports systemctl.
- name: "Service (Systemd): Verify systemctl existence"
  ansible.builtin.command: "which systemctl"
  register: _systemctl_check
  failed_when: false
  changed_when: false
  become: false
  tags: ["always"]

- name: "Service (Systemd): Fault if systemctl missing"
  ansible.builtin.fail:
    msg: "System reports 'systemd' but 'systemctl' binary was not found."
  when: _systemctl_check.rc | default(1) != 0
  tags: ["always"]

# WHY: Detect if the unit file exists to avoid 'not-found' errors during state changes.
- name: "Service (Systemd): Detect unit existence"
  ansible.builtin.command: "systemctl list-unit-files {{ service_name }}.service"
  register: _service_exists_check
  failed_when: false
  changed_when: false
  become: "{{ become_enabled | default(false, true) | bool }}"
  tags: ["always"]

- name: "Service (Systemd): Set existence fact"
  ansible.builtin.set_fact:
    _service_unit_exists: "{{ service_name in _service_exists_check.stdout | default('') }}"
  tags: ["always"]

- name: "Service (Systemd): Fault if starting missing service"
  ansible.builtin.fail:
    msg: "Systemd service '{{ service_name }}' not found. Cannot start/restart."
  when:
    - not _service_unit_exists | bool
    - (service_state | default('started', true)) in ['started', 'restarted']
  tags: ["always"]

# ---------------------------------------------------------------------
# --- Execution ---
# ---------------------------------------------------------------------

# WHY: Reload the daemon if we are about to start/restart to pick up unit changes.
- name: "Service (Systemd): Daemon reload"
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - _service_unit_exists | default(false) | bool
    - (service_state | default('started', true)) != 'stopped'
  become: "{{ become_enabled | default(false, true) | bool }}"

# WHY: Standard systemd module for state and enablement control.
- name: "Service (Systemd): Execute state change"
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    state: "{{ service_state | default('started', true) }}"
    enabled: "{{ service_enabled | default(true, true) | bool }}"
  register: _systemd_result
  retries: 3
  delay: 2
  until: _systemd_result is succeeded
  when: _service_unit_exists | default(false) | bool
  become: "{{ become_enabled | default(false, true) | bool }}"
  vars:
    fingerprint: "service_systemd_exec_{{ service_name }}"

# ---------------------------------------------------------------------
# --- Audit ---
# ---------------------------------------------------------------------

# WHY: Use include_role for log_loader to ensure cross-task consistency and traceability.
- ansible.builtin.include_role:
    name: "native"
    tasks_from: "log_loader"
  vars:
    label: "SERVICE_SYSTEMD"
    msg: "Name: {{ service_name }} | State: {{ service_state | default('started', true) }} | Exists: {{ _service_unit_exists }}"
  when: _service_unit_exists | default(false) | bool
