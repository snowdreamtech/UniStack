# =====================================================================
# roles/native/tasks/curl_conflict_loader/main.yml
#
# Purpose:
#   Resolve core package conflicts (e.g., curl-minimal vs curl).
#   Delegates execution to the OS-specific loader.
#
# Simple Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "curl_conflict_loader/main"
#
# Comprehensive Usage:
#   - ansible.builtin.include_role:
#       name: native
#       tasks_from: "curl_conflict_loader/main"
#     vars:
#       become_enabled: true  # Ensure privilege escalation for package operations
#
# =====================================================================

# ---------------------------------------------------------------------
# Invoke the os_loader to select the appropriate conflict resolution
# tasks (redhat/default/etc) based on the target OS.
# ---------------------------------------------------------------------

---
- ansible.builtin.include_role:
    name: "core"
    tasks_from: "os_loader"
  vars:
    core_loader_type: "tasks"
    core_loader_path: "tasks/curl_conflict_loader"
