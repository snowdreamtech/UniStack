# =====================================================================
# roles/native/tasks/package_loader/redhat.yml
#
# Purpose:
#   RedHat/Fedora/CentOS-specific package management via DNF/YUM.
#   Handles repository packages, local .rpm files, and remote URLs.
#
# Supported Installation Sources:
#   - Repository packages    : Standard dnf/yum install
#   - Local .rpm files       : /path/to/package.rpm
#   - Remote .rpm URLs       : https://example.com/package.rpm
#   - Source archives        : Delegated to source_builder.yml
#
# Special Support:
#   - rpm-ostree             : For Silverblue/Kinoite/Atomic
#
# Note: This file is called internally by package_loader/main.yml.
#
# Related Variables (passed from main.yml):
#   - pkg_repo_list          : Standard package names
#   - pkg_file_list          : Local .rpm file paths
#   - pkg_url_list           : Remote .rpm URLs
#   - pkg_src_list           : Source archives for compilation
#   - os_pkg_mgr             : dnf|yum|rpm_ostree
#
# =====================================================================

# ---------------------------------------------------------------------
# Execution: DNF/YUM Binary Branch
# ---------------------------------------------------------------------

# WHY: DNF efficiently handles standard names, local paths, and URLs
# in the 'name' parameter. We combine Repo, File, and URL lists.
# For Atomic systems (Silverblue/Kinoite), we use rpm_ostree_pkg.

---
- name: "Package (RedHat): Execution branch"
  block:
    - name: "Package (RedHat): rpm-ostree layering"
      community.general.rpm_ostree_pkg:
        name: "{{ pkg_item }}"
        state: "{{ package_state | default('present', true) }}"
      loop: "{{ (pkg_repo_list + pkg_file_list + pkg_url_list) }}"
      loop_control:
        loop_var: pkg_item
      when: os_pkg_mgr | default('', true) == 'rpm_ostree'
      register: package_result_ostree

    - name: "Package (RedHat EL8): Unified DNF execution via command (Bypass python 3.6 module error)"
      ansible.builtin.command: "dnf install -y {{ (pkg_repo_list + pkg_file_list + pkg_url_list) | join(' ') }}"
      when:
        - os_pkg_mgr | default('', true) != 'rpm_ostree'
        - os_version_major | default('0', true) == '8'
      register: package_result_dnf_el8
      changed_when: "'Nothing to do' not in package_result_dnf_el8.stdout"

    - name: "Package (RedHat EL9+): Unified DNF/YUM execution"
      ansible.builtin.dnf:
        name: "{{ (pkg_repo_list + pkg_file_list + pkg_url_list) }}"
        state: "{{ package_state | default('present', true) }}"
        disable_gpg_check: "{{ ansible_virtualization_type | default('') in ['docker', 'container'] }}"
        update_cache: >-
          {{
            package_force_update_cache | default(false, true)
            or
            (not (package_caches_updated[os_pkg_mgr | default('yum', true)] | default(false, true)))
          }}
      when:
        - os_pkg_mgr | default('', true) != 'rpm_ostree'
        - os_version_major | default('0', true) != '8'
      register: package_result_dnf_el9

    - name: "Package (RedHat): Mark cache as updated"
      ansible.builtin.set_fact:
        package_caches_updated: "{{ package_caches_updated | combine({(os_pkg_mgr | default('yum', true)): true}) }}"
      when:
        - package_result_dnf is defined
        - not package_result_dnf.skipped | default(false)

    - name: "Package (RedHat): Consolidate results"
      ansible.builtin.set_fact:
        package_result: >-
          {{
            package_result_ostree if (package_result_ostree is defined and not (package_result_ostree.skipped | default(false)))
            else (package_result_dnf_el8 if (package_result_dnf_el8 is defined and not (package_result_dnf_el8.skipped | default(false)))
            else package_result_dnf_el9)
          }}
      tags: ["always"]

  become: "{{ become_enabled | default(false, true) | bool }}"
  when: (pkg_repo_list + pkg_file_list + pkg_url_list) | length > 0
  vars:
    fingerprint: "package_rh_exec_{{ package_name | default('unknown', true) }}"

# ---------------------------------------------------------------------
# Execution: Source Branch
# ---------------------------------------------------------------------
- ansible.builtin.include_tasks: "source_builder.yml"
  when: (pkg_src_list | length) > 0
