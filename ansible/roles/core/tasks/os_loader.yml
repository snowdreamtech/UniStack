---
# =====================================================================
# roles/core/tasks/os_loader.yml
#
# Purpose:
#   A highly reusable multi-stage OS context loader.
#   Dynamically sniffs the OS context (family, distribution, arch, etc.)
#   and loads the best-fit variables or tasks for the calling role.
#   This eliminates hardcoded conditional logic.
#
# Usage:
#   - ansible.builtin.include_role:
#       name: core
#       tasks_from: os_loader
#     vars:
#       core_loader_type: "vars" # "vars" or "tasks"
#       core_loader_path: "vars" # directory to search in the calling role
#
# Fallback Matrix (from highest precision to broadest):
#   1. Distro ID + Version Code + Arch     (e.g., ubuntu_jammy_arm64.yml)
#   2. Distro ID + Full Version + Arch     (e.g., rocky_9.4_amd64.yml)
#   3. Distro ID + Major Version + Arch    (e.g., rocky_9_amd64.yml)
#   4. OS Family + Full Version + Arch     (e.g., redhat_9.4_arm64.yml)
#   5. OS Family + Major Version + Arch    (e.g., redhat_9_arm64.yml)
#   6. Distro ID + Version Code            (e.g., ubuntu_jammy.yml)
#   7. Distro ID + Full Version            (e.g., rocky_9.4.yml)
#   8. Distro ID + Major Version           (e.g., rocky_9.yml, ubuntu_22.yml)
#   9. OS Family + Full Version            (e.g., redhat_9.4.yml)
#  10. OS Family + Major Version           (e.g., redhat_9.yml, debian_12.yml)
#  11. Distro ID + Arch                    (e.g., alpine_arm64.yml)
#  12. OS Family + Arch                    (e.g., debian_arm64.yml)
#  13. Distro ID                           (e.g., ubuntu.yml, rocky.yml)
#  14. OS Family                           (e.g., debian.yml, redhat.yml)
#  15. Distro Name Fallback                (e.g., 'rocky_linux.yml' - handles irregular naming)
#  16. Architecture Only                   (e.g., arm64.yml - for generic binary downloads)
#  17. Ultimate Fallback                   (e.g., default.yml)
# =====================================================================

- name: "[Core] Load OS-specific variables"
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        # 1. Exact Match: Distro ID + Version Code + Arch (e.g., ubuntu_jammy_amd64.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_code | default('default', true) | lower | replace(' ', '_') }}_{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 2. Exact Match: Distro ID + Full Version + Arch (e.g., rocky_9.4_arm64.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}.{{ os_version_minor | default('0', true) | lower | replace(' ', '_') }}_{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 3. Exact Match: Distro ID + Major Version + Arch (e.g., ubuntu_22_amd64.yml, rocky_9_arm64.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}_{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 4. Exact Match: OS Family + Full Version + Arch (e.g., redhat_9.4_amd64.yml)
        - "{{ os_family | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}.{{ os_version_minor | default('0', true) | lower | replace(' ', '_') }}_{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 5. Exact Match: OS Family + Major Version + Arch (e.g., redhat_9_amd64.yml)
        - "{{ os_family | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}_{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 6. Partial Match: Distro ID + Version Code (e.g., ubuntu_jammy.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_code | default('default', true) | lower | replace(' ', '_') }}.yml"

        # 7. Partial Match: Distro ID + Full Version (e.g., rocky_9.4.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}.{{ os_version_minor | default('0', true) | lower | replace(' ', '_') }}.yml"

        # 8. Partial Match: Distro ID + Major Version (e.g., ubuntu_22.yml, rocky_9.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}.yml"

        # 9. Partial Match: OS Family + Full Version (e.g., redhat_9.4.yml)
        - "{{ os_family | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}.{{ os_version_minor | default('0', true) | lower | replace(' ', '_') }}.yml"

        # 10. Partial Match: OS Family + Major Version (e.g., redhat_9.yml, debian_12.yml)
        - "{{ os_family | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}.yml"

        # 11. Partial Match: Distro ID + Arch (e.g., ubuntu_arm64.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}_{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 12. Partial Match: OS Family + Arch (e.g., redhat_arm64.yml)
        - "{{ os_family | default('default', true) | lower | replace(' ', '_') }}_{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 13. Generic Match: Distro ID (e.g., ubuntu.yml, rocky.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}.yml"

        # 14. Generic Match: OS Family (e.g., debian.yml, redhat.yml)
        - "{{ os_family | default('default', true) | lower | replace(' ', '_') }}.yml"

        # 15. Generic Match: Distribution Name (Fallback if ID differs)
        - "{{ os_distribution | default('default', true) | lower | replace(' ', '_') }}.yml"

        # 16. Generic Match: Architecture only (e.g., arm64.yml)
        - "{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 17. Ultimate Fallback
        - "default.yml"
      paths:
        - "{{ (ansible_parent_role_paths | default([role_path], true))[0] }}/{{ core_loader_path | default('vars', true) }}"
      skip: true
  when: core_loader_type | default('vars', true) == 'vars'
  tags: ["always"]

- name: "[Core] Load OS-specific tasks"
  ansible.builtin.include_tasks: "{{ item }}"
  with_first_found:
    - files:
        # 1. Exact Match: Distro ID + Version Code + Arch (e.g., ubuntu_jammy_amd64.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_code | default('default', true) | lower | replace(' ', '_') }}_{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 2. Exact Match: Distro ID + Full Version + Arch (e.g., rocky_9.4_arm64.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}.{{ os_version_minor | default('0', true) | lower | replace(' ', '_') }}_{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 3. Exact Match: Distro ID + Major Version + Arch (e.g., ubuntu_22_amd64.yml, rocky_9_arm64.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}_{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 4. Exact Match: OS Family + Full Version + Arch (e.g., redhat_9.4_amd64.yml)
        - "{{ os_family | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}.{{ os_version_minor | default('0', true) | lower | replace(' ', '_') }}_{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 5. Exact Match: OS Family + Major Version + Arch (e.g., redhat_9_amd64.yml)
        - "{{ os_family | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}_{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 6. Partial Match: Distro ID + Version Code (e.g., ubuntu_jammy.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_code | default('default', true) | lower | replace(' ', '_') }}.yml"

        # 7. Partial Match: Distro ID + Full Version (e.g., rocky_9.4.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}.{{ os_version_minor | default('0', true) | lower | replace(' ', '_') }}.yml"

        # 8. Partial Match: Distro ID + Major Version (e.g., ubuntu_22.yml, rocky_9.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}.yml"

        # 9. Partial Match: OS Family + Full Version (e.g., redhat_9.4.yml)
        - "{{ os_family | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}.{{ os_version_minor | default('0', true) | lower | replace(' ', '_') }}.yml"

        # 10. Partial Match: OS Family + Major Version (e.g., redhat_9.yml, debian_12.yml)
        - "{{ os_family | default('default', true) | lower | replace(' ', '_') }}_{{ os_version_major | default('0', true) | lower | replace(' ', '_') }}.yml"

        # 11. Partial Match: Distro ID + Arch (e.g., ubuntu_arm64.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}_{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 12. Partial Match: OS Family + Arch (e.g., redhat_arm64.yml)
        - "{{ os_family | default('default', true) | lower | replace(' ', '_') }}_{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 13. Generic Match: Distro ID (e.g., ubuntu.yml, rocky.yml)
        - "{{ os_distribution_id | default('default', true) | lower | replace(' ', '_') }}.yml"

        # 14. Generic Match: OS Family (e.g., debian.yml, redhat.yml)
        - "{{ os_family | default('default', true) | lower | replace(' ', '_') }}.yml"

        # 15. Generic Match: Distribution Name (Fallback if ID differs)
        - "{{ os_distribution | default('default', true) | lower | replace(' ', '_') }}.yml"

        # 16. Generic Match: Architecture only (e.g., arm64.yml)
        - "{{ os_architecture_oci | default('default', true) | lower }}.yml"

        # 17. Ultimate Fallback
        - "default.yml"
      paths:
        - "{{ (ansible_parent_role_paths | default([role_path], true))[0] }}/{{ core_loader_path | default('tasks', true) }}"
      skip: true
  when: core_loader_type | default('vars', true) == 'tasks'
  tags: ["always"]
