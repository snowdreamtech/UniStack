---
# =====================================================================
# roles/init/tasks/repositories.yml
#
# Purpose:
#   Configure extra base repositories (e.g. EPEL for RedHat families).
#   Debian and Alpine are skipped here because their default repos
#   are sufficient unless mirror.yml is triggered.
# =====================================================================

# ---------------------------------------------------------------------
# RedHat: Enable EPEL Repository
# ---------------------------------------------------------------------
- name: "Install dnf-plugins-core for config-manager"
  ansible.builtin.package:
    name: "dnf-plugins-core"
    state: "present"
  when:
    - os_family == 'redhat'
    - os_version_major | int >= 8
    - os_distribution not in ['fedora', 'amazon']
  become: "{{ become_enabled }}"

- name: "Enable CRB/PowerTools repository for EPEL dependencies"
  ansible.builtin.command: "dnf config-manager --set-enabled crb"
  changed_when: false
  failed_when: false
  when:
    - os_family == 'redhat'
    - os_version_major | int >= 8
    - os_distribution not in ['fedora', 'amazon']
  become: "{{ become_enabled }}"

- name: "Install EPEL repository"
  ansible.builtin.package:
    name: "epel-release"
    state: "present"
  when:
    - os_family == 'redhat'
    - os_distribution not in ['fedora', 'amazon']
  become: "{{ become_enabled }}"

# ---------------------------------------------------------------------
# VMware Photon: Install python3-dnf for Ansible dnf module support
# ---------------------------------------------------------------------
- name: "Install python3-dnf (Photon)"
  ansible.builtin.raw: "tdnf install -y python3-dnf"
  changed_when: false
  failed_when: false
  when:
    - os_distribution_id | default('', true) == 'photon'
  become: "{{ become_enabled }}"
