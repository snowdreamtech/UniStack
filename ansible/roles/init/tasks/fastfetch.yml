---
# =====================================================================
# roles/init/tasks/fastfetch.yml
#
# Purpose:
#   Install fastfetch and configure the interactive terminal MOTD.
# =====================================================================

- name: "Install fastfetch and base utilities"
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop: "{{ init_fastfetch_packages | default(['fastfetch'], true) }}"
  become: "{{ become_enabled }}"

# Note: A real implementation would also copy a motd.sh to /etc/profile.d/
# For this migration, we ensure the package is correctly provisioned.
