---
# =====================================================================
# roles/init/tasks/user.yml
#
# Purpose:
#   Provision the primary deployment/management user account.
#   Installs shadow utilities on distros that lack useradd (OpenWrt, NixOS).
# =====================================================================

- name: "Determine appropriate shell for OS family"
  ansible.builtin.set_fact:
    _init_user_shell: >-
      {%- if os_family == 'alpine' or os_family == 'openwrt' or os_family == 'nixos' -%}
        /bin/sh
      {%- elif os_family == 'freebsd' or os_family == 'openbsd' -%}
        /bin/sh
      {%- elif os_family == 'darwin' -%}
        /bin/zsh
      {%- else -%}
        /bin/bash
      {%- endif -%}
  when: _init_user_shell is not defined or _init_user_shell == '/bin/bash'

# OpenWrt ships BusyBox only; shadow-* provides the standard user tools.
# The 'creates' guard ensures idempotency.
- name: "Install shadow user tools (OpenWrt)"
  ansible.builtin.shell: "mkdir -p /var/lock && opkg update && opkg install shadow-useradd shadow-groupadd shadow-usermod"
  args:
    creates: "/usr/sbin/useradd"
  become: "{{ become_enabled }}"
  when: "ansible_pkg_mgr == 'opkg'"

- name: "Check if nix-env is available"
  ansible.builtin.shell: "command -v nix-env"
  register: _nix_env_check
  ignore_errors: true
  changed_when: false
  become: "{{ become_enabled }}"
  environment:
    PATH: "/root/.nix-profile/bin:/nix/var/nix/profiles/default/bin:/usr/bin:/bin"

# nixos/nix container: ansible_pkg_mgr is 'unknown' (not 'nix-env') in this image.
# Detect via os_distribution_id which comes directly from /etc/os-release ID field, or fallback to nix-env check.
- name: "Install shadow utils (NixOS)"
  ansible.builtin.command: "nix-env -iA nixpkgs.shadow"
  args:
    creates: "/root/.nix-profile/bin/useradd"
  become: "{{ become_enabled }}"
  when: >
    (os_distribution_id | default(os_distribution | default('')) | lower) == 'nixos' or
    _nix_env_check.rc == 0
  environment:
    PATH: "/root/.nix-profile/bin:/nix/var/nix/profiles/default/bin:/usr/bin:/bin"

- name: "Initialize empty base passwd files (NixOS container compatibility)"
  ansible.builtin.shell: |
    if [ ! -s "{{ item.path }}" ]; then
      echo "{{ item.content }}" > "{{ item.path }}"
      chmod 644 "{{ item.path }}"
      [ "{{ item.path }}" = "/etc/shadow" ] && chmod 600 "/etc/shadow"
    fi
  loop:
    - { path: '/etc/passwd', content: 'root:x:0:0:root:/root:/bin/sh' }
    - { path: '/etc/group', content: 'root:x:0:' }
    - { path: '/etc/shadow', content: 'root:*:18000:0:99999:7:::' }
  become: "{{ become_enabled }}"
  when: >
    (os_distribution_id | default(os_distribution | default('')) | lower) == 'nixos' or
    _nix_env_check.rc == 0
  changed_when: false

- name: "Create deployment user"
  ansible.builtin.user:
    name: "{{ init_user_name }}"
    shell: "{{ _init_user_shell }}"
    state: present
    create_home: true
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) != 'darwin'"
  environment:
    PATH: "/root/.nix-profile/bin:/root/.nix-profile/sbin:/nix/var/nix/profiles/default/bin:/nix/var/nix/profiles/default/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:{{ ansible_env.PATH | default('') }}"

- name: "Determine sudo group"
  ansible.builtin.set_fact:
    _init_sudo_group: "{{ 'wheel' if os_family == 'darwin' else 'root' }}"
  tags: ["always"]

- name: "Ensure sudoers.d directory exists"
  ansible.builtin.file:
    path: "/etc/sudoers.d"
    state: directory
    owner: "root"
    group: "{{ _init_sudo_group }}"
    mode: "0750"
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) != 'darwin'"

- name: "Grant passwordless sudo privileges to the deployment user"
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ init_user_name }}"
    content: "{{ init_user_name }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: "root"
    group: "{{ _init_sudo_group }}"
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) != 'darwin'"
