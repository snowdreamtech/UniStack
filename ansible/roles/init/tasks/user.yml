---
# =====================================================================
# roles/init/tasks/user.yml
#
# Purpose:
#   Provision the primary deployment/management user account.
#   Installs shadow utilities on distros that lack useradd (OpenWrt, NixOS).
# =====================================================================

- name: "Determine appropriate shell for OS family"
  ansible.builtin.set_fact:
    _init_user_shell: >-
      {%- if os_family == 'alpine' or os_family == 'openwrt' or os_family == 'nixos' -%}
        /bin/sh
      {%- elif os_family == 'freebsd' or os_family == 'openbsd' or os_family == 'netbsd' -%}
        /bin/sh
      {%- elif os_family == 'darwin' -%}
        /bin/zsh
      {%- else -%}
        /bin/bash
      {%- endif -%}
  when: _init_user_shell is not defined or _init_user_shell == '/bin/bash'

# OpenWrt ships BusyBox only; shadow-* provides the standard user tools.
# The 'creates' guard ensures idempotency.
- name: "Install shadow user tools (OpenWrt)"
  ansible.builtin.shell: "mkdir -p /var/lock && opkg update && opkg install shadow-useradd shadow-groupadd shadow-usermod"
  args:
    creates: "/usr/sbin/useradd"
  become: "{{ become_enabled }}"
  when: "ansible_pkg_mgr == 'opkg'"

- name: "Create deployment user"
  ansible.builtin.user:
    name: "{{ init_user_name }}"
    shell: "{{ _init_user_shell }}"
    state: present
    create_home: true
  register: _init_user_info
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) not in ['darwin', 'nixos']"
  environment:
    PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:{{ ansible_env.PATH | default('') }}"

- name: "Ensure deployment user .ssh directory has correct permissions"
  ansible.builtin.file:
    path: "{{ _init_user_info.home }}/.ssh"
    state: directory
    owner: "{{ init_user_name }}"
    mode: "0700"
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) not in ['darwin', 'nixos']"

- name: "Enforce secure permissions (0600) on deployment user SSH files"
  ansible.builtin.shell: |
    set -e
    SSH_DIR="{{ _init_user_info.home }}/.ssh"
    if [ -d "$SSH_DIR" ]; then
      # Convert symlinked authorized_keys to a regular file if it exists
      if [ -L "$SSH_DIR/authorized_keys" ]; then
        cat "$SSH_DIR/authorized_keys" > "$SSH_DIR/authorized_keys.tmp"
        rm -f "$SSH_DIR/authorized_keys"
        mv "$SSH_DIR/authorized_keys.tmp" "$SSH_DIR/authorized_keys"
      fi
      # Enforce 0700 on the .ssh directory itself
      chmod 0700 "$SSH_DIR"
      # Enforce 0600 on all files in .ssh
      find "$SSH_DIR" -type f -exec chmod 0600 {} +
      # Ensure correct ownership
      chown -R {{ init_user_name }}:{{ _init_user_info.group | default(init_user_name) }} "$SSH_DIR"
    fi
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) not in ['darwin', 'nixos']"
  changed_when: false

- name: "Fix CI runner SSH permissions (Linux and other BSDs)"
  ansible.builtin.shell: |
    set -e
    SSH_DIR="/home/runner/.ssh"
    if [ -d "$SSH_DIR" ] && id -u runner >/dev/null 2>&1; then
      if [ -L "$SSH_DIR/authorized_keys" ]; then
        cat "$SSH_DIR/authorized_keys" > "$SSH_DIR/authorized_keys.tmp"
        rm -f "$SSH_DIR/authorized_keys"
        mv "$SSH_DIR/authorized_keys.tmp" "$SSH_DIR/authorized_keys"
      fi
      chmod 0700 "$SSH_DIR"
      find "$SSH_DIR" -type f -exec chmod 0600 {} +
      TARGET_GROUP=$(id -gn runner 2>/dev/null || true)
      if [ -n "$TARGET_GROUP" ]; then
        chown -R "runner:${TARGET_GROUP}" "$SSH_DIR"
      else
        chown -R runner "$SSH_DIR"
      fi
    fi
  become: "{{ become_enabled }}"
  when:
    - "(os_family | default('') | lower) not in ['darwin', 'nixos', 'freebsd']"
  changed_when: false
  ignore_errors: true

- name: "Fix CI runner SSH permissions (FreeBSD)"
  ansible.builtin.shell: |
    set -e
    SSH_DIR="/usr/home/runner/.ssh"
    if [ -d "$SSH_DIR" ] && id -u runner >/dev/null 2>&1; then
      if [ -L "$SSH_DIR/authorized_keys" ]; then
        cat "$SSH_DIR/authorized_keys" > "$SSH_DIR/authorized_keys.tmp"
        rm -f "$SSH_DIR/authorized_keys"
        mv "$SSH_DIR/authorized_keys.tmp" "$SSH_DIR/authorized_keys"
      fi
      chmod 0700 "$SSH_DIR"
      find "$SSH_DIR" -type f -exec chmod 0600 {} +
      TARGET_GROUP=$(id -gn runner 2>/dev/null || true)
      if [ -n "$TARGET_GROUP" ]; then
        chown -R "runner:${TARGET_GROUP}" "$SSH_DIR"
      else
        chown -R runner "$SSH_DIR"
      fi
    fi
  become: "{{ become_enabled }}"
  when:
    - "(os_family | default('') | lower) == 'freebsd'"
  changed_when: false
  ignore_errors: true

- name: "Ensure sudoers.d directory exists"
  ansible.builtin.file:
    path: "/etc/sudoers.d"
    state: directory
    owner: "{{ unistack_root_user }}"
    group: "{{ unistack_root_group }}"
    mode: "0750"
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) not in ['darwin', 'nixos']"

- name: "Grant passwordless sudo privileges to the deployment user"
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ init_user_name }}"
    content: "{{ init_user_name }} ALL=(ALL) NOPASSWD:ALL\n"
    owner: "{{ unistack_root_user }}"
    group: "{{ unistack_root_group }}"
    mode: "0440"
    validate: "visudo -cf %s"
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) not in ['darwin', 'nixos']"
