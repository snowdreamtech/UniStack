---
# =====================================================================
# roles/init/tasks/openssh.yml
#
# Purpose:
#   Install and secure the OpenSSH daemon.
# =====================================================================

- name: "Install OpenSSH packages (dnf/tdnf/dnf5/urpmi workaround)"
  ansible.builtin.shell: |
    if command -v urpmi > /dev/null 2>&1; then
      urpmi --auto {{ init_openssh_packages | join(' ') }}
    elif command -v tdnf > /dev/null 2>&1; then
      tdnf install -y {{ init_openssh_packages | join(' ') }}
    elif command -v dnf > /dev/null 2>&1; then
      dnf install -y {{ init_openssh_packages | join(' ') }}
    fi
  become: "{{ become_enabled }}"
  when:
    - "(os_family | default('') | lower) not in ['darwin', 'nixos', 'freebsd', 'openbsd', 'netbsd', 'dragonfly']"
    - "ansible_pkg_mgr in ['tdnf', 'dnf', 'dnf5', 'urpmi']"
    - "init_openssh_packages | length > 0"
  changed_when: false

- name: "Install OpenSSH packages"
  ansible.builtin.package:
    name: "{{ item }}"
    state: present
  loop: "{{ init_openssh_packages }}"
  become: "{{ become_enabled }}"
  when:
    - "(os_family | default('') | lower) not in ['darwin', 'nixos', 'freebsd', 'openbsd', 'netbsd', 'dragonfly']"
    - "ansible_pkg_mgr not in ['tdnf', 'dnf', 'dnf5', 'urpmi']"
    - "(ansible_pkg_mgr | default('unknown')) != 'unknown'"

- name: "Generate SSH host keys (Critical for Containers)"
  ansible.builtin.command: "ssh-keygen -t {{ item.type }} -f {{ item.path }} -N ''"
  args:
    creates: "{{ item.path }}"
  loop:
    - { type: "rsa", path: "/etc/ssh/ssh_host_rsa_key" }
    - { type: "ecdsa", path: "/etc/ssh/ssh_host_ecdsa_key" }
    - { type: "ed25519", path: "/etc/ssh/ssh_host_ed25519_key" }
  become: "{{ become_enabled }}"
  changed_when: false
  when: "(os_family | default('') | lower) not in ['darwin', 'nixos']"

- name: "Load controller public keys"
  ansible.builtin.set_fact:
    controller_public_keys:
      - "{{ lookup('ansible.builtin.file', '~/.ssh/id_ed25519.pub', errors='ignore') }}"
      - "{{ lookup('ansible.builtin.file', '~/.ssh/id_rsa.pub', errors='ignore') }}"
      - "{{ lookup('ansible.builtin.file', '~/.ssh/id_ecdsa.pub', errors='ignore') }}"
  when: "(os_family | default('') | lower) not in ['darwin', 'nixos']"

- name: "Add controller keys to authorized_keys"
  ansible.builtin.authorized_key:
    user: "{{ init_user_name }}"
    key: "{{ item }}"
    state: "present"
    exclusive: false
  loop: "{{ controller_public_keys | reject('equalto', '') | list }}"
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) not in ['darwin', 'nixos']"

- name: "Ensure sshd_config.d directory exists"
  ansible.builtin.file:
    path: "/etc/ssh/sshd_config.d"
    state: directory
    owner: "{{ unistack_root_user }}"
    group: "{{ unistack_root_group }}"
    mode: "0755"
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) not in ['darwin', 'nixos']"

- name: "Ensure sshd_config includes sshd_config.d directory"
  ansible.builtin.lineinfile:
    path: "/etc/ssh/sshd_config"
    line: "Include /etc/ssh/sshd_config.d/*.conf"
    insertbefore: BOF
    state: present
    validate: "/usr/sbin/sshd -t -f %s"
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) not in ['darwin', 'nixos']"
  notify: restart_sshd

- name: "Deploy OpenSSH hardening configuration"
  ansible.builtin.template:
    src: "99-hardening.conf.j2"
    dest: "/etc/ssh/sshd_config.d/99-hardening.conf"
    owner: "{{ unistack_root_user }}"
    group: "{{ unistack_root_group }}"
    mode: "0600"
  become: "{{ become_enabled }}"
  when: "(os_family | default('') | lower) not in ['darwin', 'nixos']"
  notify: restart_sshd

- name: "Ensure OpenSSH service is enabled and started (Native)"
  ansible.builtin.service:
    name: "{{ init_sshd_service | default('sshd', true) }}"
    state: started
    enabled: true
  become: "{{ become_enabled }}"
  when:
    - "not is_container | bool"
    - "(os_family | default('') | lower) not in ['darwin', 'nixos']"

- name: "Ensure OpenSSH service is enabled and started (Container)"
  ansible.builtin.command: "/usr/sbin/sshd"
  changed_when: false
  failed_when: false
  become: "{{ become_enabled }}"
  when:
    - "is_container | bool"
    - "(os_family | default('') | lower) not in ['darwin', 'nixos']"
