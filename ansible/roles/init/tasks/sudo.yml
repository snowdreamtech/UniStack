---
# =====================================================================
# roles/init/tasks/sudo.yml
#
# Purpose:
#   Installs the sudo package if it is not present.
#   Handles edge cases for distros with non-standard package managers
#   or missing Python bindings (dnf5, tdnf, emerge).
# =====================================================================

# Gentoo: portage tree must be synced before any emerge can run.
# We detect Gentoo by its package manager rather than os_family,
# because the stage3 container may not have a recognized os-release.
- name: "Sync portage tree (Gentoo)"
  ansible.builtin.shell: "mkdir -p /var/db/repos/gentoo && emerge-webrsync"
  args:
    creates: "/var/db/repos/gentoo/profiles"
  become: "{{ become_enabled }}"
  when: "ansible_pkg_mgr == 'portage'"

- name: "Install sudo (Gentoo/portage)"
  ansible.builtin.command: "emerge -q --noreplace app-admin/sudo"
  become: "{{ become_enabled }}"
  when: "ansible_pkg_mgr == 'portage'"
  changed_when: false

# Photon OS / Fedora / RHEL: Ansible's package module requires Python
# bindings (python3-libdnf5 / python3-dnf) to be importable from the
# venv, which may not work. Use the raw binary instead.
# Note: Photon uses tdnf (dnf-compatible), while Fedora uses dnf/dnf5.
- name: "Install sudo (dnf/tdnf/dnf5 workaround)"
  ansible.builtin.shell: |
    if command -v tdnf > /dev/null 2>&1; then
      tdnf install -y sudo
    elif command -v dnf > /dev/null 2>&1; then
      dnf install -y sudo
    fi
  args:
    creates: "/usr/bin/sudo"
  become: "{{ become_enabled }}"
  when: "(ansible_pkg_mgr | default('')) in ['tdnf', 'dnf', 'dnf5']"

# Generic package install for all other supported distros.
# Skip: macOS (no sudo needed), OpenWrt (no useradd infra),
# emerge (handled above), dnf/tdnf (handled above), unknown managers.
- name: "Install sudo"
  ansible.builtin.package:
    name: sudo
    state: present
  become: "{{ become_enabled }}"
  when:
    - "(os_family | default('') | lower) != 'darwin'"
    - "ansible_pkg_mgr not in ['portage', 'tdnf', 'dnf', 'dnf5', 'unknown']"
    - "(ansible_pkg_mgr | default('unknown')) != 'unknown'"
