---
# =====================================================================
# roles/init/defaults/main.yml
# =====================================================================

# ---------------------------------------------------------------------
# Base Features
# ---------------------------------------------------------------------
init_mirror_enabled: false

# ---------------------------------------------------------------------
# Mirror Source URLs (Used only when init_mirror_enabled: true)
# ---------------------------------------------------------------------
init_mirror_url_alpine: "https://mirrors.tuna.tsinghua.edu.cn/alpine"
init_mirror_url_debian: "https://mirrors.tuna.tsinghua.edu.cn/debian"
init_mirror_url_debian_security: "https://mirrors.tuna.tsinghua.edu.cn/debian-security"
init_mirror_url_ubuntu: "https://mirrors.tuna.tsinghua.edu.cn/ubuntu"
init_mirror_url_centos: "https://mirrors.tuna.tsinghua.edu.cn/centos"
init_mirror_url_epel: "https://mirrors.tuna.tsinghua.edu.cn/epel"

# ---------------------------------------------------------------------
# User Configuration
# ---------------------------------------------------------------------
init_user_name: "ansible"
# init_user_password: "$6$..." # Optional

# ---------------------------------------------------------------------
# SSH Configuration
# ---------------------------------------------------------------------
init_sshd_port: 22
init_sshd_permit_root_login: "no"
init_sshd_password_authentication: "yes"

# Map to the sshd dictionary required by 99-hardening.conf.j2
sshd:
  port: "{{ init_sshd_port }}"
  permit_root_login: "{{ init_sshd_permit_root_login }}"
  password_authentication: "{{ init_sshd_password_authentication }}"
