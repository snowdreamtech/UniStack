---
# =====================================================================
# roles/init/handlers/main.yml
# =====================================================================

- name: "Restart sshd safely (Native)"
  ansible.builtin.service:
    name: "{{ init_sshd_service | default('sshd', true) }}"
    state: restarted
  become: "{{ become_enabled }}"
  listen: "restart_sshd"
  when:
    - "not is_container | bool"

- name: "Wait for SSH port to be ready after restart"
  ansible.builtin.wait_for:
    host: "{{ inventory_hostname }}"
    port: 22
    delay: 0
    timeout: 30
    state: started
  listen: "restart_sshd"
  become: false
  changed_when: false
  when:
    - "not is_container | bool"

- name: "Verify SSH daemon is accepting connections (Diagnostic)"
  ansible.builtin.command: "sshd -T"
  become: "{{ become_enabled }}"
  listen: "restart_sshd"
  changed_when: false
  register: _sshd_config_test
  failed_when: false
  when:
    - "not is_container | bool"
  # This is for diagnostic purposes only; failures here don't block the playbook

- name: "Restart sshd safely (Container)"
  ansible.builtin.shell: |
    if command -v pkill >/dev/null 2>&1; then
      pkill -HUP sshd
    elif command -v pidof >/dev/null 2>&1; then
      kill -HUP $(pidof sshd)
    elif [ -f /var/run/sshd.pid ]; then
      kill -HUP $(cat /var/run/sshd.pid)
    else
      echo "No method to reload sshd" >&2
      exit 1
    fi
  changed_when: false
  failed_when: false
  become: "{{ become_enabled }}"
  listen: "restart_sshd"
  when:
    - "is_container | bool"
