---
- name: Verify connectivity and reliability (Ping)
  ansible.builtin.ping:

- name: Get Root Disk Space (macOS fallback)
  ansible.builtin.shell: df -h / | awk 'NR==2 {print $4 " Free / " $2 " Total"}'
  register: root_disk_space_mac
  changed_when: false
  when: (ansible_mounts | default([]) | selectattr('mount', 'equalto', '/') | list | length) == 0


- name: Output System Diagnostics
  ansible.builtin.debug:
    msg: 
      - "✅ Reachability Test Passed!"
      - "Hostname: {{ ansible_hostname }}"
      - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
      - "Kernel: {{ ansible_kernel }}"
      - "Architecture: {{ ansible_architecture }}"
      - "CPU Cores: {{ ansible_processor_vcpus | default('Unknown') }}"
      - "Total RAM: {{ (ansible_memtotal_mb / 1024) | round(2) }} GB"
      - "Root Disk: {{ 
          ((ansible_mounts | selectattr('mount', 'equalto', '/') | first).size_available / 1024 / 1024 / 1024) | round(2) | string + 'GB Free / ' + 
          ((ansible_mounts | selectattr('mount', 'equalto', '/') | first).size_total / 1024 / 1024 / 1024) | round(2) | string + 'GB Total'
          if (ansible_mounts | default([]) | selectattr('mount', 'equalto', '/') | list | length) > 0 
          else root_disk_space_mac.stdout | default('Unknown') 
        }}"
      - "Primary IP: {{ ansible_default_ipv4.address | default('N/A') }}"
      - "Python Version: {{ ansible_python_version }}"
      - "Ansible Version: {{ ansible_version.string }}"
