---
# =====================================================================
# requirements.yml
#
# Purpose:
#   External Ansible collection dependencies.
#   Specifies the exact versions of community and vendor collections
#   required for the project to ensure consistent execution
#   environments.
#
# Simple Usage:
#   ansible-galaxy collection install -r requirements.yml
#
# Comprehensive Usage:
#   ansible-galaxy collection install -r requirements.yml -p ./collections
#
# =====================================================================

collections:
  - name: "community.general"
    version: "13.1.0"

  # POSIX utilities including SELinux management for RHEL-based systems.
  - name: "ansible.posix"
    version: "2.2.1"

  # Podman management collection for enterprise-grade containers.
  - name: "containers.podman"
    version: "1.20.2"

  # Docker management collection supporting Buildx, Swarm, and Compose v2.
  - name: "community.docker"
    version: "5.2.1"

  # Kubernetes management collection for K8s deployments.
  - name: "kubernetes.core"
    version: "6.4.0"
